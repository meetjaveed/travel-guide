            ]}
        ];

        function App() {
            const [visited, setVisited] = useState(() => JSON.parse(localStorage.getItem('hubli_quest_gamified') || '[]'));
            const [userLoc, setUserLoc] = useState(null);
            const [isTracking, setIsTracking] = useState(false);
            const [xp, setXp] = useState(0);

            useEffect(() => {
                localStorage.setItem('hubli_quest_gamified', JSON.stringify(visited));
                setXp(visited.length * 100);
            }, [visited]);

            const calculateDist = (lat1, lon1, lat2, lon2) => {
                const R = 6371;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            };

            const initiateGPS = () => {
                if (!navigator.geolocation) return alert("GPS is not supported.");
                setIsTracking(true);
                navigator.geolocation.watchPosition(
                    (pos) => setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    (err) => { alert("Permission Denied."); setIsTracking(false); },
                    { enableHighAccuracy: true }
                );
            };

            const toggleVisit = (id) => {
                setVisited(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
            };

            const totalSpots = TRAVEL_DATA.reduce((acc, c) => acc + c.spots.length, 0);
            const progress = Math.round((visited.length / totalSpots) * 100);
            const level = Math.floor(xp / 500) + 1;

            return (
                <div className="min-h-screen">
                    {/* Gamified Header */}
                    <header className="bg-indigo-700 pt-10 pb-20 px-6 rounded-b-[48px] shadow-2xl sticky top-0 z-50 overflow-hidden">
                        <div className="absolute top-0 right-0 p-8 opacity-10 rotate-12">
                            <i className="fa-solid fa-earth-asia fa-10x"></i>
                        </div>
                        
                        <div className="flex justify-between items-center mb-8 relative z-10">
                            <div>
                                <h1 className="text-2xl font-black tracking-tighter italic">HUBLI QUEST</h1>
                                <div className="flex items-center gap-2 mt-1 bg-white/10 px-3 py-1 rounded-full backdrop-blur-md">
                                    <span className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                                    <p className="text-[10px] font-bold uppercase tracking-widest text-indigo-100">Lv.{level} Pathseeker</p>
                                </div>
                            </div>
                            <button 
                                onClick={initiateGPS} 
                                className={`w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl transition-all border-4 ${isTracking ? 'bg-indigo-600 border-indigo-400 radar-ping relative' : 'bg-white text-indigo-700 border-indigo-200'}`}
                            >
                                <i className={`fa-solid ${isTracking ? 'fa-satellite' : 'fa-location-crosshairs'} text-xl`}></i>
                            </button>
                        </div>

                        {/* XP and Progress Bar */}
                        <div className="relative z-10 space-y-4">
                            <div className="flex justify-between items-end">
                                <div>
                                    <p className="text-[10px] font-black text-indigo-100 uppercase tracking-widest">Experience (XP)</p>
                                    <p className="text-2xl font-black leading-none">{xp} <span className="text-sm font-bold opacity-60">pts</span></p>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] font-black text-indigo-100 uppercase tracking-widest">Completion</p>
                                    <p className="text-2xl font-black leading-none">{progress}%</p>
                                </div>
                            </div>
                            <div className="h-4 bg-indigo-900/40 rounded-full overflow-hidden border border-indigo-400/20 shadow-inner">
                                <div className="h-full bg-gradient-to-r from-green-400 to-emerald-500 progress-bar shadow-[0_0_15px_rgba(52,211,153,0.5)]" style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>
                    </header>

                    {/* Quest List */}
                    <main className="px-5 -mt-10 space-y-12 pb-32 relative z-20">
                        {TRAVEL_DATA.map(group => {
                            const completedInCity = group.spots.filter(s => visited.includes(s.id)).length;
                            const cityMaster = completedInCity === group.spots.length;
                            
                            return (
                                <div key={group.city} className="space-y-6">
                                    <div className="flex items-center justify-between px-2">
                                        <div className="flex items-center gap-3">
                                            <div className="w-1.5 h-8 bg-indigo-500 rounded-full shadow-lg shadow-indigo-500/50"></div>
                                            <h2 className="text-2xl font-black uppercase italic tracking-tighter">{group.city}</h2>
                                        </div>
                                        {cityMaster && (
                                            <div className="city-badge bg-indigo-500/20 px-3 py-1 rounded-full border border-indigo-500/50 flex items-center gap-2">
                                                <i className="fa-solid fa-crown text-yellow-400 text-xs"></i>
                                                <span className="text-[10px] font-black text-indigo-300 uppercase tracking-widest">City Master</span>
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="grid gap-4">
                                        {group.spots.map(spot => {
                                            const isChecked = visited.includes(spot.id);
                                            const dist = userLoc ? calculateDist(userLoc.lat, userLoc.lng, spot.lat, spot.lng) : null;
                                            
                                            return (
                                                <div 
                                                    key={spot.id} 
                                                    className={`spot-card glass p-6 rounded-[32px] border shadow-xl relative overflow-hidden ${isChecked ? 'visited' : 'border-slate-800'}`}
                                                >
                                                    {isChecked && (
                                                        <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
                                                            <i className="fa-solid fa-check-circle fa-4x text-green-500"></i>
                                                        </div>
                                                    )}
                                                    
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div className="flex-1">
                                                            <div className="flex items-center gap-2 mb-2">
                                                                <span className="text-[9px] font-black text-indigo-400 uppercase tracking-widest">Spot ID: {spot.id.toUpperCase()}</span>
                                                                <span className={`text-[9px] font-bold px-2 py-0.5 rounded-lg ${
                                                                    dist === null ? 'bg-slate-800 text-slate-500' : 
                                                                    dist < 1.5 ? 'bg-green-500/20 text-green-400 border border-green-500/50' : 'bg-indigo-500/20 text-indigo-300'
                                                                }`}>
                                                                    {dist === null ? 'OFFLINE' : dist < 1 ? `${Math.round(dist*1000)}m RADAR` : `${dist.toFixed(1)}km AWAY`}
                                                                </span>
                                                            </div>
                                                            <h4 className="font-black text-lg leading-tight mb-2 tracking-tight">{spot.name}</h4>
                                                            <p className="text-[11px] text-slate-400 leading-relaxed italic">{spot.desc}</p>
                                                        </div>
                                                        <a 
                                                            href={`https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}`} 
                                                            target="_blank" 
                                                            className="w-12 h-12 bg-indigo-600/20 border border-indigo-500/30 text-indigo-400 rounded-2xl flex items-center justify-center active:bg-indigo-500 active:text-white transition-all shadow-lg"
                                                        >
                                                            <i className="fa-solid fa-diamond-turn-right text-lg"></i>
                                                        </a>
                                                    </div>
                                                    
                                                    <button 
                                                        onClick={() => toggleVisit(spot.id)} 
                                                        className={`w-full py-4 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-2 ${
                                                            isChecked 
                                                            ? 'bg-green-500 text-white shadow-lg shadow-green-500/40' 
                                                            : 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/40 active:scale-95'
                                                        }`}
                                                    >
                                                        <i className={`fa-solid ${isChecked ? 'fa-check-double' : 'fa-crosshairs'}`}></i>
                                                        {isChecked ? 'Quest Completed' : 'Check-In (+100 XP)'}
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            );
                        })}
                    </main>

                    {/* Footer Nav */}
                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-slate-900/80 backdrop-blur-2xl border border-white/10 shadow-[0_30px_60px_rgba(0,0,0,0.8)] py-5 px-10 rounded-[40px] flex justify-between items-center z-50">
                        <button onClick={() => window.scrollTo({top:0, behavior:'smooth'})} className="flex flex-col items-center gap-1 text-indigo-400">
                            <i className="fa-solid fa-compass text-xl"></i>
                            <span className="text-[8px] font-black uppercase tracking-widest">Radar</span>
                        </button>
                        <button 
                            onClick={() => {
                                const next = TRAVEL_DATA.flatMap(c => c.spots).find(s => !visited.includes(s.id));
                                if(next) {
                                    const el = document.getElementById('spot-' + next.id);
                                    el?.scrollIntoView({behavior: 'smooth', block: 'center'});
                                }
                            }}
                            className="flex flex-col items-center gap-1 text-slate-400"
                        >
                            <i className="fa-solid fa-bolt-lightning text-xl"></i>
                            <span className="text-[8px] font-black uppercase tracking-widest">Next Quest</span>
                        </button>
                        <button 
                            onClick={() => confirm("ERASE ALL PROGRESS?") && setVisited([])} 
                            className="flex flex-col items-center gap-1 text-red-500/60"
                        >
                            <i className="fa-solid fa-power-off text-xl"></i>
                            <span className="text-[8px] font-black uppercase tracking-widest">Reset</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
