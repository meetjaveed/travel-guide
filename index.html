<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hubli Quest | Travel Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .check-btn {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .check-btn.active {
            background-color: #22c55e;
            color: white;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
        }

        .check-btn.inactive {
            background-color: rgba(30, 41, 59, 0.6);
            color: rgba(148, 163, 184, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide-up {
            animation: slideUp 0.4s ease forwards;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="pb-36">

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TRAVEL_DATA = [
            {
                city: "Agra",
                transit: "Bus / Auto",
                spots: [
                    { id: "ag1", name: "Taj Mahal", lat: 27.1751, lng: 78.0421, desc: "A world-famous white marble mausoleum built by Shah Jahan in memory of his beloved wife. It is a masterpiece of Mughal architecture and a UNESCO World Heritage site." },
                    { id: "ag2", name: "Agra Fort", lat: 27.1795, lng: 78.0211, desc: "A historic red sandstone fortress that served as the primary residence of the Mughal emperors until 1638. It contains various palaces like the Jahangir Palace and Moti Masjid." },
                    { id: "ag3", name: "Itmad-ud-Daulah (Baby Taj)", lat: 27.1929, lng: 78.0311, desc: "Often referred to as the 'Baby Taj', this tomb is the first Mughal structure built entirely of marble. It features delicate stone inlay work and is located on the bank of the Yamuna." },
                    { id: "ag4", name: "Jama Masjid Agra", lat: 27.1858, lng: 78.0163, desc: "A grand 17th-century mosque built by Shah Jahan's daughter, Jahanara Begum. It is known for its red sandstone structure and beautiful marble domes." },
                    { id: "ag5", name: "Mehtab Bagh", lat: 27.1788, lng: 78.0423, desc: "The Moonlight Garden situated on the opposite bank of the Yamuna, offering a spectacular view of the Taj Mahal. It is a classic Mughal Charbagh design." }
                ]
            },
            {
                city: "Lucknow",
                transit: "Metro / Bus",
                spots: [
                    { id: "lk1", name: "Bara Imambara & Bhulbhulaiya", lat: 26.8689, lng: 80.9135, desc: "A grand assembly hall with a massive vaulted chamber built without beams. It houses the famous Bhulbhulaiya, a complex labyrinth of corridors." },
                    { id: "lk2", name: "Chhota Imambara", lat: 26.8770, lng: 80.9048, desc: "Also known as the Palace of Lights, famous for its crystal chandeliers and silver throne. It was built by Muhammad Ali Shah and features exquisite calligraphy." },
                    { id: "lk3", name: "Rumi Darwaza", lat: 26.8684, lng: 80.9122, desc: "An imposing 60-foot gateway modeled after the Sublime Porte in Istanbul. It stands as a signature landmark and entry point to Old Lucknow." },
                    { id: "lk4", name: "Dargah Dada Miyan", lat: 26.8521, lng: 80.9322, desc: "A highly revered Sufi shrine of Hazrat Shah Meena Shah, located in the old city. It attracts devotees seeking spiritual peace and blessings." },
                    { id: "lk5", name: "Ambedkar Memorial Park", lat: 26.8454, lng: 80.9785, desc: "A massive public memorial park built entirely of red sandstone from Rajasthan. It features sprawling lawns, elephant statues, and a grand memorial stupa." }
                ]
            },
            {
                city: "Bahraich",
                transit: "Bus / Auto",
                spots: [
                    { id: "ba1", name: "Dargah Syed Salar Masood Ghazi", lat: 27.5855, lng: 81.6033, desc: "An ancient shrine of the 11th-century warrior saint, visited by thousands during the Jeth Mela. It is a powerful symbol of faith and sinkretisme in the region." }
                ]
            },
            {
                city: "Kanpur / Makanpur",
                transit: "Bus / Train",
                spots: [
                    { id: "ka1", name: "Dargah Zinda Shah Madar", lat: 26.8373, lng: 80.0465, desc: "A world-renowned shrine of the founder of the Madariyya Sufi order in Makanpur. It is one of the oldest and most prominent Sufi centers in India." },
                    { id: "ka2", name: "JK Temple", lat: 26.4754, lng: 80.3060, desc: "A stunning white marble temple dedicated to Lord Radhakrishna, blending ancient and modern styles. It is surrounded by beautifully manicured gardens." }
                ]
            },
            {
                city: "Bareilly",
                transit: "Bus / Auto",
                spots: [
                    { id: "br1", name: "Dargah-e-Ala Hazrat", lat: 28.3751, lng: 79.4144, desc: "The shrine of Imam Ahmed Raza Khan, a world-famous Islamic jurist and scholar. It is a global center for the Barelvi movement and Islamic learning." }
                ]
            },
            {
                city: "Delhi",
                transit: "Metro / Bus / Train",
                spots: [
                    { id: "de1", name: "Dargah Hazrat Qutubuddin Bakhtiyar Kaki", lat: 28.5220, lng: 77.1840, desc: "The oldest Sufi shrine in Delhi, dedicated to the spiritual successor of Khwaja Moinuddin Chishti. Located in Mehrauli, it is a site of immense spiritual peace." },
                    { id: "de2", name: "Hazrat Khwaja Nasiruddin Mahmood Chirag-Dehlavi Dargah", lat: 28.5410, lng: 77.2380, desc: "The resting place of the 14th-century saint known as the 'Lamp of Delhi'. This shrine is a highly revered historical sanctuary in South Delhi." },
                    { id: "de3", name: "Red Fort", lat: 28.6562, lng: 77.2410, desc: "A UNESCO site and the primary residence of Mughal emperors for 200 years. It stands as a grand symbol of India's historical power and independence." },
                    { id: "de4", name: "Nizamuddin Dargah", lat: 28.5913, lng: 77.2425, desc: "The sacred shrine of the world-renowned Sufi saint Hazrat Nizamuddin Auliya. It is legendary for its soulful evening Qawwali performances." }
                ]
            },
            {
                city: "Ajmer",
                transit: "Bus / Train",
                spots: [
                    { id: "aj1", name: "Ajmer Sharif Dargah", lat: 26.4561, lng: 74.6284, desc: "The holy shrine of Khwaja Moinuddin Chishti, 'Gharib Nawaz'. It is one of the most significant pilgrimage destinations in the world." },
                    { id: "aj2", name: "Adhai Din Ka Jhopda", lat: 26.4552, lng: 74.6251, desc: "An early Indo-Islamic mosque commissioned by Qutb-ud-din Aibak and built in just 2.5 days. It features unique carved pillars and arches." },
                    { id: "aj3", name: "Ana Sagar Lake", lat: 26.4741, lng: 74.6258, desc: "A beautiful artificial lake built in the 12th century, famous for its marble pavilions (Baradari). It is a popular spot for evening walks and sunsets." }
                ]
            },
            {
                city: "Pushkar",
                transit: "Bus / Auto",
                spots: [
                    { id: "pu1", name: "Brahma Temple", lat: 26.4900, lng: 74.5500, desc: "One of the very few dedicated temples in the world for Lord Brahma, the creator. It is a major spiritual destination for pilgrims visiting Pushkar." },
                    { id: "pu2", name: "Pushkar Lake Ghats", lat: 26.4883, lng: 74.5518, desc: "A sacred lake with 52 holy bathing ghats where devotees take a ritual dip. It is the religious heart of the town and host to the famous fair." }
                ]
            }
        ];

        const SpotCard = ({ spot, city, visited, toggleVisit, userLoc, isTracking }) => {
            const [expanded, setExpanded] = useState(false);

            const dist = useMemo(() => {
                if (!userLoc || !isTracking) return null;
                const R = 6371;
                const dLat = (spot.lat - userLoc.lat) * Math.PI / 180;
                const dLon = (spot.lng - userLoc.lng) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(userLoc.lat * Math.PI / 180) * Math.cos(spot.lat * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                const d = R * c;
                return d < 1 ? `${Math.round(d * 1000)}m` : `${d.toFixed(1)}km`;
            }, [userLoc, isTracking, spot]);

            const isVisited = visited.includes(spot.id);

            return (
                <div className={`glass-card p-4 rounded-[28px] flex gap-4 items-start ${isVisited ? 'opacity-40 grayscale-[0.5]' : ''}`}>
                    {/* Left: Distance + Check */}
                    <div className="flex flex-col items-center gap-1 shrink-0 w-12 pt-1">
                        <span className={`text-[9px] font-black uppercase tracking-tight text-center leading-none h-4 ${isTracking ? 'text-indigo-400' : 'text-slate-600'}`}>
                            {isTracking ? (dist || "calc...") : "Offline"}
                        </span>
                        <button 
                            onClick={() => toggleVisit(spot.id)}
                            className={`check-btn w-11 h-11 rounded-2xl flex items-center justify-center text-lg ${isVisited ? 'active' : 'inactive'}`}
                        >
                            <i className={`fas ${isVisited ? 'fa-check' : 'fa-circle-plus opacity-20'}`}></i>
                        </button>
                    </div>

                    {/* Middle: Content */}
                    <div className="flex-1">
                        <h4 className="text-[15px] font-bold text-white leading-snug mb-1">
                            {spot.name}
                        </h4>
                        <p className={`text-[11px] text-slate-400 leading-relaxed transition-all ${expanded ? '' : 'line-clamp-2'}`}>
                            {spot.desc}
                        </p>
                        <button 
                            onClick={() => setExpanded(!expanded)}
                            className="text-[10px] font-bold text-indigo-400 mt-1 uppercase tracking-wider"
                        >
                            {expanded ? "Show Less" : "Show More"}
                        </button>
                    </div>

                    {/* Right: Actions */}
                    <div className="flex flex-col gap-2 shrink-0">
                        <a 
                            href={`https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}`}
                            target="_blank"
                            className="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-800 text-slate-400 hover:text-indigo-400 transition-colors"
                        >
                            <i className="fa-solid fa-diamond-turn-right text-xs"></i>
                        </a>
                        <a 
                            href={`https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}&travelmode=transit`}
                            target="_blank"
                            className="w-9 h-9 flex items-center justify-center rounded-xl bg-indigo-600/20 text-indigo-400 border border-indigo-500/20"
                        >
                            <i className="fa-solid fa-bus text-xs"></i>
                        </a>
                    </div>
                </div>
            );
        };

        function App() {
            const [visited, setVisited] = useState(() => JSON.parse(localStorage.getItem('hq_final_v5') || '[]'));
            const [userLoc, setUserLoc] = useState(null);
            const [isTracking, setIsTracking] = useState(false);
            const [search, setSearch] = useState("");

            useEffect(() => {
                localStorage.setItem('hq_final_v5', JSON.stringify(visited));
            }, [visited]);

            const toggleGPS = () => {
                if (isTracking) { setIsTracking(false); setUserLoc(null); return; }
                navigator.geolocation.getCurrentPosition((pos) => {
                    setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                    setIsTracking(true);
                    navigator.geolocation.watchPosition(p => setUserLoc({ lat: p.coords.latitude, lng: p.coords.longitude }));
                }, () => alert("GPS Error: Please enable location services in your phone settings."), { enableHighAccuracy: true });
            };

            const toggleVisit = (id) => {
                setVisited(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
            };

            const filtered = TRAVEL_DATA.map(g => ({
                ...g, spots: g.spots.filter(s => s.name.toLowerCase().includes(search.toLowerCase()) || g.city.toLowerCase().includes(search.toLowerCase()))
            })).filter(g => g.spots.length > 0);

            const total = TRAVEL_DATA.reduce((acc, c) => acc + c.spots.length, 0);

            return (
                <div className="min-h-screen px-4 pt-4 max-w-xl mx-auto">
                    {/* Header */}
                    <header className="flex justify-between items-center py-5 sticky top-0 bg-[#020617]/95 backdrop-blur-md z-50">
                        <div>
                            <h1 className="text-2xl font-black tracking-tighter text-white italic uppercase">Hubli Quest</h1>
                            <p className="text-[10px] font-bold text-slate-500 tracking-[0.2em]">{visited.length} / {total} COMPLETED</p>
                        </div>
                        <button 
                            onClick={toggleGPS} 
                            className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-all ${isTracking ? 'bg-indigo-600 shadow-lg shadow-indigo-500/30' : 'bg-slate-800 border border-slate-700'}`}
                        >
                            <i className={`fas ${isTracking ? 'fa-satellite animate-pulse text-white' : 'fa-location-dot text-slate-500'} text-xl`}></i>
                        </button>
                    </header>

                    {/* Search */}
                    <div className="relative mb-10">
                        <i className="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-600"></i>
                        <input 
                            value={search} onChange={e=>setSearch(e.target.value)}
                            placeholder="Find city or shrine..." 
                            className="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-4 pl-12 pr-6 text-sm text-white focus:outline-none focus:ring-1 focus:ring-indigo-500/30 transition-all"
                        />
                    </div>

                    {/* Groups */}
                    <main className="space-y-12">
                        {filtered.map((group, idx) => (
                            <div key={group.city} className="animate-slide-up" style={{animationDelay: `${idx*0.05}s`}}>
                                <div className="flex items-center gap-3 mb-5 px-1">
                                    <h2 className="text-[11px] font-black text-indigo-400 uppercase tracking-[0.3em]">{group.city}</h2>
                                    <div className="h-px flex-1 bg-slate-800"></div>
                                    <span className="text-[8px] font-bold text-slate-500 border border-slate-800 px-2 py-0.5 rounded-md uppercase">{group.transit}</span>
                                </div>
                                <div className="grid gap-4">
                                    {group.spots.map(spot => (
                                        <SpotCard 
                                            key={spot.id} 
                                            spot={spot} 
                                            city={group.city}
                                            visited={visited}
                                            toggleVisit={toggleVisit}
                                            userLoc={userLoc}
                                            isTracking={isTracking}
                                        />
                                    ))}
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* Navigation */}
                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-slate-900/90 backdrop-blur-xl border border-white/5 py-4 px-10 rounded-[35px] flex justify-between shadow-[0_25px_50px_-12px_rgba(0,0,0,1)] z-50">
                        <button onClick={()=>window.scrollTo({top:0, behavior:'smooth'})} className="flex flex-col items-center gap-1.5 text-indigo-500">
                            <i className="fas fa-compass text-xl"></i>
                            <span className="text-[8px] font-bold uppercase tracking-widest">Guide</span>
                        </button>
                        <button 
                            onClick={() => {
                                const next = TRAVEL_DATA.flatMap(g=>g.spots).find(s=>!visited.includes(s.id));
                                if(next) setSearch(next.name);
                            }}
                            className="flex flex-col items-center gap-1.5 text-slate-500"
                        >
                            <i className="fas fa-map-pin text-xl"></i>
                            <span className="text-[8px] font-bold uppercase tracking-widest">Next</span>
                        </button>
                        <button onClick={() => confirm("Reset all data?") && setVisited([])} className="flex flex-col items-center gap-1.5 text-red-500/30">
                            <i className="fas fa-rotate-left text-xl"></i>
                            <span className="text-[8px] font-bold uppercase tracking-widest">Reset</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
