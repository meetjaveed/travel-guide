<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hubli Travel Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .glass-card:active {
            transform: scale(0.98);
            background: rgba(30, 41, 59, 0.8);
        }

        .city-gradient {
            background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-bar {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TRAVEL_DATA = [
            {
                city: "Agra",
                spots: [
                    { name: "Taj Mahal", lat: 27.1751, lng: 78.0421, desc: "A world-renowned white marble mausoleum built by Shah Jahan in memory of his beloved wife. It is a masterpiece of Mughal architecture and a UNESCO World Heritage site." },
                    { name: "Agra Fort", lat: 27.1795, lng: 78.0211, desc: "A historic red sandstone fortress that served as the primary residence of the Mughal emperors. It contains various palaces like the Khas Mahal and Jahangir Palace." },
                    { name: "Itmad-ud-Daulah (Baby Taj)", lat: 27.1929, lng: 78.0311, desc: "Often referred to as the 'Baby Taj', this tomb is the first Mughal structure built entirely of marble. It features delicate inlay work and is located on the bank of the Yamuna." },
                    { name: "Jama Masjid", lat: 27.1858, lng: 78.0163, desc: "A grand 17th-century mosque built by Shah Jahan's daughter, Jahanara Begum. It is known for its red sandstone structure and marble domes." },
                    { name: "Moti Masjid", lat: 27.1800, lng: 78.0220, desc: "The 'Pearl Mosque' located within Agra Fort, known for its pristine white marble architecture. It was built by Shah Jahan for the royal members of the court." },
                    { name: "Mehtab Bagh", lat: 27.1788, lng: 78.0423, desc: "The Moonlight Garden situated on the opposite bank of the Yamuna, offering a spectacular view of the Taj Mahal. It was the last of eleven Mughal-built gardens." },
                    { name: "Ram Bagh", lat: 27.2000, lng: 78.0400, desc: "The oldest Mughal garden in India, originally laid out by Emperor Babur in 1528. It is designed in the traditional Charbagh style with cooling water channels." }
                ]
            },
            {
                city: "Lucknow",
                spots: [
                    { name: "Bara Imambara", lat: 26.8689, lng: 80.9135, desc: "A grand assembly hall with a massive vaulted chamber built without any beams. It houses the famous Bhulbhulaiya, a complex labyrinth of corridors." },
                    { name: "Chhota Imambara", lat: 26.8770, lng: 80.9048, desc: "Also known as the Palace of Lights, famous for its intricate chandeliers and silver throne. It was built by Muhammad Ali Shah and features exquisite calligraphy." },
                    { name: "Rumi Darwaza", lat: 26.8684, lng: 80.9122, desc: "An imposing gateway that is a signature landmark of Lucknow, modeled after the Sublime Porte in Istanbul. It stands sixty feet tall and showcases Awadhi architecture." },
                    { name: "The Residency", lat: 26.8631, lng: 80.9272, desc: "A group of ruins that served as the residence for the British Resident General. It played a significant role during the 1857 uprising and is now a protected monument." },
                    { name: "Ambedkar Memorial Park", lat: 26.8454, lng: 80.9785, desc: "A massive public park and memorial built entirely of red sandstone from Rajasthan. It features sprawling lawns, elephant statues, and a grand memorial stupa." },
                    { name: "Janeshwar Mishra Park", lat: 26.8400, lng: 81.0000, desc: "An eco-friendly park claimed to be Asia's largest, featuring jogging tracks and a man-made lake. It provides a vast green lung for the city of Lucknow." },
                    { name: "Dargah Dada Miyan", lat: 26.8521, lng: 80.9322, desc: "A highly revered Sufi shrine of Hazrat Shah Meena Shah, located in the old city. It attracts devotees from all walks of life seeking spiritual peace." },
                    { name: "Shah Mina Shah Mazar", lat: 26.8500, lng: 80.9300, desc: "The resting place of the 15th-century Sufi saint, known as the patron saint of Lucknow. The shrine is a center for spiritual guidance and communal harmony." }
                ]
            },
            {
                city: "Bahraich",
                spots: [
                    { name: "Dargah Syed Salar Masood Ghazi", lat: 27.5855, lng: 81.6033, desc: "An ancient shrine of the 11th-century warrior saint, visited by thousands during the annual Jeth Mela. It is a symbol of faith and religious syncretism in the region." },
                    { name: "Maneejri Masjid", lat: 27.5700, lng: 81.5900, desc: "A local historical mosque known for its traditional architecture and community importance. It serves as a spiritual hub for the residents of Bahraich." },
                    { name: "Jama Masjid Bahraich", lat: 27.5750, lng: 81.6000, desc: "The central congregational mosque of the city, featuring classic minarets and domes. It is the primary site for Friday prayers and major Islamic festivals." }
                ]
            },
            {
                city: "Kanpur / Makanpur",
                spots: [
                    { name: "Dargah Zinda Shah Madar", lat: 26.8373, lng: 80.0465, desc: "A world-renowned shrine of the founder of the Madariyya Sufi order in Makanpur. It is one of the oldest and most prominent Sufi centers in India." },
                    { name: "Kanpur Memorial Church", lat: 26.4500, lng: 80.3600, desc: "Built in 1875 in Gothic Revival style to honor the British lost during the 1857 siege. It features beautiful stained glass windows and detailed brickwork." },
                    { name: "JK Temple", lat: 26.4754, lng: 80.3060, desc: "A stunning white marble temple dedicated to Lord Radhakrishna, blending ancient and modern styles. It is surrounded by lush gardens and is a major landmark in Kanpur." },
                    { name: "Allen Forest Zoo", lat: 26.5050, lng: 80.3000, desc: "One of the few zoos in India created in a natural forest, providing a large habitat for animals. It is a major recreational spot and center for wildlife conservation." },
                    { name: "Nana Rao Park", lat: 26.4700, lng: 80.3500, desc: "A historic park built on the site of the 1857 Bibighar massacre, now dedicated to Nana Sahib. It serves as a peaceful city park with various statues and plant life." }
                ]
            },
            {
                city: "Kichocha (Akbarpur)",
                spots: [
                    { name: "Dargah Makhdoom Ashraf Semnani", lat: 26.4258, lng: 82.7569, desc: "A world-famous Sufi shrine known for its spiritual healing and tranquility. The 'Neer' (holy water) from the nearby pond is believed to have curative properties." }
                ]
            },
            {
                city: "Bareilly",
                spots: [
                    { name: "Dargah-e-Ala Hazrat", lat: 28.3751, lng: 79.4144, desc: "The shrine of Imam Ahmed Raza Khan, a 19th-century polymath and influential Islamic scholar. It is a global center for the Barelvi movement and Islamic learning." },
                    { name: "Dargah Shah Sharafat Ali Mia", lat: 28.3600, lng: 79.4200, desc: "A prominent Sufi shrine dedicated to Shah Sharafat Ali, known for its beautiful architecture. It is a site of deep spiritual significance for the local community." },
                    { name: "Phool Bagh", lat: 28.3700, lng: 79.4100, desc: "A well-maintained public garden in Bareilly offering a peaceful environment for recreation. It features a variety of flora and is a popular spot for morning walks." },
                    { name: "Akshar Vihar", lat: 28.3500, lng: 79.4300, desc: "A recreational park centered around a large lake, popular for boating and family outings. It is one of the major green spaces for residents of Bareilly." }
                ]
            },
            {
                city: "Haridwar / Roorkee",
                spots: [
                    { name: "Piran Kaliyar Sharif", lat: 29.9161, lng: 77.9351, desc: "The 13th-century shrine of Alauddin Ali Ahmed Sabir Kaliyari near Roorkee. It is one of the most sacred Sufi sites in India, famous for its spiritual aura." },
                    { name: "Har Ki Pauri", lat: 29.9564, lng: 78.1707, desc: "The most famous ghat on the banks of the Ganges where the evening Aarti is performed. It is believed to be the spot where the river enters the plains from the mountains." }
                ]
            },
            {
                city: "Sadhaura (near Ambala)",
                spots: [
                    { name: "Dargah of Shah Qumais", lat: 30.3792, lng: 77.2025, desc: "A historic Sufi shrine in Sadhaura belonging to the Qadiriya order. It is an important spiritual landmark for the Gumaisia region and northern Haryana." }
                ]
            },
            {
                city: "Panipat",
                spots: [
                    { name: "Kala Amb", lat: 29.4000, lng: 76.9900, desc: "A memorial site marking the spot where the 3rd Battle of Panipat took place in 1761. It serves as a tribute to the Maratha warriors who fought with great bravery." },
                    { name: "Panipat Museum", lat: 29.3950, lng: 76.9800, desc: "A museum dedicated to the history of the three legendary battles of Panipat. It displays artifacts, weapons, and maps that showcase the region's military past." },
                    { name: "Dargah Bu Ali Shah Qalandar", lat: 29.3909, lng: 76.9744, desc: "The shrine of the 13th-century Sufi saint from Azerbaijan who settled in Panipat. It is a center of spirituality and attracts visitors of all faiths." },
                    { name: "Ibrahim Lodhi’s Tomb", lat: 29.3920, lng: 76.9750, desc: "The final resting place of the last Sultan of the Lodi dynasty, killed in the 1st Battle of Panipat. It is a simple rectangular structure standing on a high platform." }
                ]
            },
            {
                city: "Delhi",
                spots: [
                    { name: "Dargah Hazrat Qutubuddin Bakhtiyar Kaki", lat: 28.5220, lng: 77.1840, desc: "The oldest Sufi shrine in Delhi dedicated to the spiritual successor of Khwaja Moinuddin Chishti. Located in Mehrauli, it is a site of immense spiritual peace." },
                    { name: "Dargah Hazrat Khwaja Nasiruddin Mahmood Chirag-Dehlavi", lat: 28.5410, lng: 77.2380, desc: "The resting place of the 14th-century Sufi saint known as the 'Lamp of Delhi'. This shrine is a highly revered historical sanctuary in South Delhi." },
                    { name: "Red Fort", lat: 28.6562, lng: 77.2410, desc: "A UNESCO World Heritage site and the primary residence of the Mughal emperors for 200 years. It is a symbol of India's independence and architectural grandeur." },
                    { name: "Humayun’s Tomb", lat: 28.5933, lng: 77.2507, desc: "The first garden-tomb on the Indian subcontinent, built in 1570 for the Mughal Emperor. It served as the architectural inspiration for the Taj Mahal." },
                    { name: "Qutub Minar", lat: 28.5244, lng: 77.1855, desc: "The tallest brick minaret in the world, built in 1193 by Qutb-ud-din Aibak. The complex also houses the ancient Iron Pillar and various ruined temples." },
                    { name: "Jama Masjid", lat: 28.6507, lng: 77.2334, desc: "One of the largest mosques in India, built by Emperor Shah Jahan in the heart of Old Delhi. It can accommodate more than 25,000 devotees in its courtyard." },
                    { name: "Nizamuddin Dargah", lat: 28.5913, lng: 77.2425, desc: "The shrine of the world-renowned Sufi saint Nizamuddin Auliya, located in the Nizamuddin area. It is famous for its soulful evening Qawwali sessions." },
                    { name: "Lotus Temple", lat: 28.5535, lng: 77.2588, desc: "A Bahá'í House of Worship notable for its lotus-like flower shape. It is a site of silent prayer and meditation open to people of all religions." },
                    { name: "Lodhi Gardens", lat: 28.5931, lng: 77.2197, desc: "A vast city park containing the tombs of 15th-century Lodhi and Sayyid rulers. It is a popular spot for walkers and history enthusiasts in South Delhi." },
                    { name: "Garden of Five Senses", lat: 28.5100, lng: 77.2000, desc: "A uniquely designed park in Saket meant to stimulate all five human senses. It features murals, sculptures, and various themed gardens in a sprawling area." }
                ]
            },
            {
                city: "Ajmer",
                spots: [
                    { name: "Ajmer Sharif Dargah", lat: 26.4561, lng: 74.6284, desc: "The holy shrine of Khwaja Moinuddin Chishti, the founder of the Chishtiya Sufi order. It is one of the most sacred and visited pilgrimage sites in India." },
                    { name: "Taragarh Fort", lat: 26.4468, lng: 74.6189, desc: "A historic fort built on a steep hill, offering panoramic views of Ajmer city. It was one of the oldest hill forts in India and served as a strategic military outpost." },
                    { name: "Adhai Din Ka Jhopda", lat: 26.4552, lng: 74.6251, desc: "An early Indo-Islamic mosque built by Qutb-ud-din Aibak in just two and a half days. It features a stunning screen of arches and intricately carved pillars." },
                    { name: "Ana Sagar Lake", lat: 26.4741, lng: 74.6258, desc: "A large artificial lake built in the 12th century, surrounded by marble pavilions (Baradari). It is a popular spot for evening walks and enjoying the scenic sunset." },
                    { name: "Daulat Bagh gardens", lat: 26.4750, lng: 74.6260, desc: "A beautiful garden adjacent to Ana Sagar Lake, built by Emperor Jahangir. It features marble pavilions and lush greenery, perfect for relaxation by the lakeside." }
                ]
            },
            {
                city: "Salwar Sharif",
                spots: [
                    { name: "Dargah of Khwaja Fakhruddin Chishti", lat: 26.5500, lng: 74.8000, desc: "The shrine of the eldest son of Khwaja Moinuddin Chishti, located in Salwar. It is a significant Sufi site for those following the Chishtiya tradition." }
                ]
            },
            {
                city: "Pushkar",
                spots: [
                    { name: "Brahma Temple", lat: 26.4900, lng: 74.5500, desc: "One of the very few temples in the world dedicated to the Hindu creator god, Brahma. It is a major site for pilgrims visiting the holy town of Pushkar." },
                    { name: "Pushkar Lake Ghats", lat: 26.4883, lng: 74.5518, desc: "A sacred lake surrounded by 52 bathing ghats where devotees take a holy dip. It is the center of the town's religious life and host to the famous Pushkar fair." }
                ]
            }
        ];

        function App() {
            const [visited, setVisited] = useState(() => JSON.parse(localStorage.getItem('visited_spots_en') || '[]'));
            const [userLoc, setUserLoc] = useState(null);
            const [isTracking, setIsTracking] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");

            useEffect(() => {
                localStorage.setItem('visited_spots_en', JSON.stringify(visited));
            }, [visited]);

            const calculateDistance = (lat1, lon1, lat2, lon2) => {
                const R = 6371;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon / 2) * Math.sin(dLon / 2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                return R * c;
            };

            const toggleGPS = () => {
                if (!navigator.geolocation) {
                    alert("Geolocation is not supported by your browser.");
                    return;
                }

                if (isTracking) {
                    setIsTracking(false);
                    setUserLoc(null);
                } else {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                            setIsTracking(true);
                            navigator.geolocation.watchPosition(
                                (watchPos) => setUserLoc({ lat: watchPos.coords.latitude, lng: watchPos.coords.longitude }),
                                (err) => console.error(err),
                                { enableHighAccuracy: true }
                            );
                        },
                        (err) => {
                            alert("Please enable location access in your device settings to use the Radar.");
                            setIsTracking(false);
                        },
                        { enableHighAccuracy: true }
                    );
                }
            };

            const toggleVisit = (name) => {
                setVisited(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
            };

            const filteredData = useMemo(() => {
                return TRAVEL_DATA.map(group => ({
                    ...group,
                    spots: group.spots.filter(spot => 
                        spot.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                        group.city.toLowerCase().includes(searchQuery.toLowerCase())
                    )
                })).filter(group => group.spots.length > 0);
            }, [searchQuery]);

            const totalSpots = TRAVEL_DATA.reduce((acc, g) => acc + g.spots.length, 0);
            const progress = Math.round((visited.length / totalSpots) * 100);

            return (
                <div className="min-h-screen max-w-2xl mx-auto p-4 space-y-6">
                    <header className="flex justify-between items-center py-4 sticky top-0 bg-[#020617] z-50">
                        <div>
                            <h1 className="text-2xl font-black tracking-tight text-white uppercase italic">Hubli Quest</h1>
                            <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">
                                Progress: {visited.length} / {totalSpots} • {progress}%
                            </div>
                        </div>
                        <button 
                            onClick={toggleGPS}
                            className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-all ${isTracking ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'bg-slate-800 text-slate-400'}`}
                        >
                            <i className={`fas ${isTracking ? 'fa-satellite animate-pulse' : 'fa-location-dot'}`}></i>
                        </button>
                    </header>

                    <div className="relative group">
                        <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-500 transition-colors"></i>
                        <input 
                            type="text" 
                            placeholder="Search cities or monuments..." 
                            className="w-full search-bar rounded-2xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all text-slate-200"
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                        />
                    </div>

                    <div className="h-1 bg-slate-800 rounded-full overflow-hidden">
                        <div 
                            className="h-full bg-indigo-500 transition-all duration-700 ease-out"
                            style={{ width: `${progress}%` }}
                        ></div>
                    </div>

                    <main className="space-y-10">
                        {filteredData.map((group, gIdx) => (
                            <section key={group.city} className="space-y-4 animate-fade-in" style={{ animationDelay: `${gIdx * 0.05}s` }}>
                                <div className="flex items-center gap-3">
                                    <div className="h-px flex-1 bg-slate-800"></div>
                                    <h2 className="city-gradient font-black text-xs uppercase tracking-[0.2em]">{group.city}</h2>
                                    <div className="h-px flex-1 bg-slate-800"></div>
                                </div>
                                
                                <div className="grid gap-3">
                                    {group.spots.map((spot) => {
                                        const isVisited = visited.includes(spot.name);
                                        const dist = userLoc ? calculateDistance(userLoc.lat, userLoc.lng, spot.lat, spot.lng) : null;
                                        
                                        return (
                                            <div 
                                                key={spot.name} 
                                                className={`glass-card p-5 rounded-3xl relative overflow-hidden ${isVisited ? 'opacity-60 grayscale-[0.5]' : ''}`}
                                            >
                                                <div className="flex justify-between items-start gap-4">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <h4 className={`text-lg font-bold tracking-tight ${isVisited ? 'text-slate-500 line-through' : 'text-slate-100'}`}>
                                                                {spot.name}
                                                            </h4>
                                                            {isTracking && dist !== null && (
                                                                <span className="text-[9px] font-black bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded-md uppercase">
                                                                    {dist < 1 ? `${Math.round(dist * 1000)}m` : `${dist.toFixed(1)}km`}
                                                                </span>
                                                            )}
                                                        </div>
                                                        <p className="text-xs text-slate-400 leading-relaxed italic">
                                                            {spot.desc}
                                                        </p>
                                                    </div>
                                                    
                                                    <div className="flex flex-col gap-2">
                                                        <a 
                                                            href={`https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}`}
                                                            target="_blank"
                                                            className="w-10 h-10 bg-indigo-500/10 text-indigo-500 rounded-xl flex items-center justify-center transition-all hover:bg-indigo-500 hover:text-white"
                                                        >
                                                            <i className="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                                                        </a>
                                                        <button 
                                                            onClick={() => toggleVisit(spot.name)}
                                                            className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${isVisited ? 'bg-green-500 text-white' : 'bg-slate-800 text-slate-500'}`}
                                                        >
                                                            <i className={`fas ${isVisited ? 'fa-check' : 'fa-circle-check opacity-20'}`}></i>
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>
                        ))}
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-slate-900/80 backdrop-blur-xl border border-white/5 py-4 px-10 rounded-full flex justify-between items-center shadow-2xl z-50">
                        <button onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} className="flex flex-col items-center gap-1 text-indigo-500">
                            <i className="fas fa-home text-lg"></i>
                            <span className="text-[8px] font-bold uppercase tracking-widest">Home</span>
                        </button>
                        <button 
                            onClick={() => {
                                const next = TRAVEL_DATA.flatMap(g => g.spots).find(s => !visited.includes(s.name));
                                if (next) {
                                    setSearchQuery(next.name);
                                    setTimeout(() => window.scrollTo({top: 0, behavior: 'smooth'}), 100);
                                }
                            }}
                            className="flex flex-col items-center gap-1 text-slate-500"
                        >
                            <i className="fas fa-search text-lg"></i>
                            <span className="text-[8px] font-bold uppercase tracking-widest">Search</span>
                        </button>
                        <button 
                            onClick={() => {
                                if(confirm("Reset all visit history?")) {
                                    setVisited([]);
                                    localStorage.removeItem('visited_spots_en');
                                }
                            }}
                            className="flex flex-col items-center gap-1 text-red-500/40"
                        >
                            <i className="fas fa-rotate-left text-lg"></i>
                            <span className="text-[8px] font-bold uppercase tracking-widest">Reset</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
