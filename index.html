        function App() {
            const [visited, setVisited] = useState(() => JSON.parse(localStorage.getItem('hq_final_v1') || '[]'));
            const [userLoc, setUserLoc] = useState(null);
            const [isTracking, setIsTracking] = useState(false);
            const [status, setStatus] = useState({ type: 'info', msg: 'Welcome back, Pathseeker.' });

            useEffect(() => {
                localStorage.setItem('hq_final_v1', JSON.stringify(visited));
            }, [visited]);

            const calculateDist = (lat1, lon1, lat2, lon2) => {
                const R = 6371;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            };

            const toggleGPS = () => {
                if (!navigator.geolocation) {
                    setStatus({ type: 'error', msg: 'GPS Not Supported.' });
                    return;
                }

                if (isTracking) {
                    setIsTracking(false);
                    setStatus({ type: 'info', msg: 'Radar Deactivated.' });
                    return;
                }

                // Explicit user gesture call
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                        setIsTracking(true);
                        setStatus({ type: 'success', msg: 'Radar Locked On.' });
                        
                        // Set up watch for continuous tracking
                        navigator.geolocation.watchPosition(
                            (wPos) => setUserLoc({ lat: wPos.coords.latitude, lng: wPos.coords.longitude }),
                            () => {},
                            { enableHighAccuracy: true }
                        );
                    },
                    (err) => {
                        let msg = "Permission Denied. Enable GPS in Settings.";
                        if (err.code === 3) msg = "Timeout. Try moving to open space.";
                        setStatus({ type: 'error', msg: msg });
                        setIsTracking(false);
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            };

            const toggleVisit = (id) => {
                setVisited(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
            };

            const total = TRAVEL_DATA.reduce((acc, c) => acc + c.spots.length, 0);
            const progress = Math.round((visited.length / total) * 100);
            const level = Math.floor(visited.length / 5) + 1;

            return (
                <div className="min-h-screen">
                    {/* Header: Smaller, more compact */}
                    <header className="bg-indigo-700/80 backdrop-blur-lg pt-6 pb-6 px-6 rounded-b-[32px] shadow-2xl sticky top-0 z-50 border-b border-indigo-400/20">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h1 className="text-xl font-extrabold tracking-tighter italic">TRAVEL QUEST</h1>
                                <div className="flex items-center gap-2 mt-0.5">
                                    <span className="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span>
                                    <p className="text-[10px] font-bold uppercase tracking-widest text-indigo-100">Lv.{level} Traveler</p>
                                </div>
                            </div>
                            <button 
                                onClick={toggleGPS} 
                                className={`w-12 h-12 rounded-xl flex items-center justify-center shadow-lg transition-all border-2 ${isTracking ? 'bg-indigo-600 border-indigo-400 scanning relative overflow-hidden' : 'bg-white text-indigo-700 border-indigo-200'}`}
                            >
                                <i className={`fa-solid ${isTracking ? 'fa-satellite' : 'fa-location-crosshairs'} text-lg`}></i>
                            </button>
                        </div>

                        <div className="space-y-2">
                            <div className="flex justify-between items-center text-[10px] font-bold uppercase text-indigo-100">
                                <span>{progress}% Completed</span>
                                <span>{visited.length} / {total} Spots</span>
                            </div>
                            <div className="h-1.5 bg-indigo-900/40 rounded-full overflow-hidden border border-indigo-400/10">
                                <div className="h-full bg-green-400 progress-bar" style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>
                    </header>

                    {/* Status Message: Custom UI instead of alerts */}
                    <div className="px-6 mt-4">
                        <div className={`p-3 rounded-xl border flex items-center justify-between shadow-lg transition-all ${status.type === 'error' ? 'bg-red-500/20 border-red-500/50 text-red-200' : status.type === 'success' ? 'bg-green-500/20 border-green-500/50 text-green-200' : 'bg-slate-800 border-slate-700 text-slate-300'}`}>
                            <p className="text-[11px] font-bold uppercase tracking-tight">{status.msg}</p>
                            <button onClick={() => setStatus({type:'info', msg:'Explorer Mode Active'})}><i className="fa-solid fa-xmark opacity-60"></i></button>
                        </div>
                    </div>

                    {/* List */}
                    <main className="px-5 mt-6 space-y-10 pb-32">
                        {TRAVEL_DATA.map(group => (
                            <div key={group.city} className="space-y-4">
                                <h2 className="text-lg font-black text-white/90 uppercase italic tracking-tighter px-2 flex items-center gap-2">
                                    <div className="w-1 h-4 bg-indigo-500 rounded-full"></div>
                                    {group.city}
                                </h2>
                                <div className="space-y-4">
                                    {group.spots.map(spot => {
                                        const isChecked = visited.includes(spot.id);
                                        const dist = userLoc ? calculateDist(userLoc.lat, userLoc.lng, spot.lat, spot.lng) : null;
                                        return (
                                            <div key={spot.id} className={`p-5 rounded-[24px] border transition-all ${isChecked ? 'card-active border-indigo-500/40 opacity-80 shadow-[0_0_20px_rgba(99,102,241,0.1)]' : 'glass'}`}>
                                                <div className="flex justify-between items-start mb-3">
                                                    <div className="flex-1 pr-4">
                                                        <div className="flex items-center gap-2 mb-1.5">
                                                            <span className={`text-[8px] font-bold px-1.5 py-0.5 rounded-md ${dist === null ? 'bg-slate-800 text-slate-500' : dist < 1.5 ? 'bg-green-500/30 text-green-400' : 'bg-indigo-500/20 text-indigo-300'}`}>
                                                                {dist === null ? 'RADAR OFFLINE' : dist < 1 ? `${Math.round(dist*1000)}m AWAY` : `${dist.toFixed(1)}km AWAY`}
                                                            </span>
                                                        </div>
                                                        <h4 className="font-bold text-base leading-tight mb-2">{spot.name}</h4>
                                                        <p className="text-[10px] text-slate-400 leading-normal mb-4 italic opacity-80">{spot.desc}</p>
                                                    </div>
                                                    <a href={`https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}`} target="_blank" className="w-10 h-10 bg-indigo-600/20 border border-indigo-500/40 text-indigo-400 rounded-xl flex items-center justify-center active:scale-90 transition-all">
                                                        <i class="fa-solid fa-arrow-up-right-from-square text-sm"></i>
                                                    </a>
                                                </div>
                                                <button 
                                                    onClick={() => toggleVisit(spot.id)} 
                                                    className={`w-full py-3 rounded-xl font-bold text-[9px] uppercase tracking-widest transition-all ${isChecked ? 'bg-green-600/20 text-green-400 border border-green-500/30' : 'bg-indigo-600 text-white shadow-lg active:scale-95'}`}
                                                >
                                                    {isChecked ? 'Location Cleared' : 'Complete Visit (+100 XP)'}
                                                </button>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* Footer Nav */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-slate-900/90 backdrop-blur-2xl border border-white/5 shadow-2xl py-4 px-10 rounded-full flex justify-between items-center z-50">
                        <button onClick={() => window.scrollTo({top:0, behavior:'smooth'})} className="text-indigo-400 flex flex-col items-center gap-1">
                            <i className="fa-solid fa-compass text-lg"></i>
                            <span className="text-[7px] font-bold uppercase tracking-widest">Radar</span>
                        </button>
                        <button 
                            onClick={() => {
                                const next = TRAVEL_DATA.flatMap(c => c.spots).find(s => !visited.includes(s.id));
                                if(next) {
                                    const el = document.getElementById('spot-' + next.id);
                                    window.scrollTo({top: (el?.offsetTop || 0) - 150, behavior: 'smooth'});
                                }
                            }}
                            className="text-slate-500 flex flex-col items-center gap-1"
                        >
                            <i className="fa-solid fa-forward-step text-lg"></i>
                            <span className="text-[7px] font-bold uppercase tracking-widest">Next</span>
                        </button>
                        <button onClick={() => confirm("ERASE ALL DATA?") && setVisited([])} className="text-red-500/60 flex flex-col items-center gap-1">
                            <i className="fa-solid fa-rotate-left text-lg"></i>
                            <span className="text-[7px] font-bold uppercase tracking-widest">Reset</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
