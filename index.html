<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hubli Quest: Smart Travel Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease-in-out;
        }

        .check-btn {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .check-btn.active {
            background-color: #22c55e;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        .check-btn.inactive {
            background-color: rgba(30, 41, 59, 0.6);
            color: rgba(148, 163, 184, 0.4);
        }

        .transit-badge {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease forwards;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="pb-32">

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TRAVEL_DATA = [
            {
                city: "Agra",
                transit: "Bus / Auto",
                spots: [
                    { name: "Taj Mahal", lat: 27.1751, lng: 78.0421, desc: "A world-famous white marble mausoleum built by Shah Jahan. It is a masterpiece of Mughal architecture and a UNESCO site." },
                    { name: "Agra Fort", lat: 27.1795, lng: 78.0211, desc: "A historic red sandstone fortress that served as the main residence of the Mughal emperors." },
                    { name: "Itmad-ud-Daulah", lat: 27.1929, lng: 78.0311, desc: "Often called the 'Baby Taj', this is the first Mughal structure built entirely of white marble." },
                    { name: "Jama Masjid", lat: 27.1858, lng: 78.0163, desc: "A grand 17th-century mosque built by Shah Jahan's daughter, Jahanara Begum, using red sandstone." },
                    { name: "Mehtab Bagh", lat: 27.1788, lng: 78.0423, desc: "The Moonlight Garden situated across the Yamuna, offering a spectacular view of the Taj Mahal." }
                ]
            },
            {
                city: "Lucknow",
                transit: "Metro / Bus",
                spots: [
                    { name: "Bara Imambara", lat: 26.8689, lng: 80.9135, desc: "A grand assembly hall with a massive vaulted chamber and the world-famous Bhulbhulaiya labyrinth." },
                    { name: "Chhota Imambara", lat: 26.8770, lng: 80.9048, desc: "The Palace of Lights, famous for its intricate chandeliers and exquisite Nawabi calligraphy." },
                    { name: "Rumi Darwaza", lat: 26.8684, lng: 80.9122, desc: "An imposing 60-foot gateway modeled after the Sublime Porte in Istanbul, an icon of Lucknow." },
                    { name: "Ambedkar Park", lat: 26.8454, lng: 80.9785, desc: "A massive public memorial park built entirely of red sandstone featuring grand elephant statues." }
                ]
            },
            {
                city: "Delhi",
                transit: "Metro / Bus / Train",
                spots: [
                    { name: "Dargah Bakhtiyar Kaki", lat: 28.5220, lng: 77.1840, desc: "The oldest Sufi shrine in Delhi, dedicated to the spiritual successor of Khwaja Moinuddin Chishti." },
                    { name: "Chirag-Dehlavi Dargah", lat: 28.5410, lng: 77.2380, desc: "The resting place of the 14th-century saint known as the 'Lamp of Delhi' in South Delhi." },
                    { name: "Red Fort", lat: 28.6562, lng: 77.2410, desc: "A UNESCO site and the primary residence of Mughal emperors for 200 years, iconic for its red walls." },
                    { name: "Qutub Minar", lat: 28.5244, lng: 77.1855, desc: "The tallest brick minaret in the world, built in 1193, surrounded by ancient historical ruins." },
                    { name: "Nizamuddin Dargah", lat: 28.5913, lng: 77.2425, desc: "The world-renowned shrine of Sufi saint Nizamuddin Auliya, famous for its soulful evening Qawwalis." }
                ]
            },
            {
                city: "Ajmer",
                transit: "Bus / Auto",
                spots: [
                    { name: "Ajmer Sharif Dargah", lat: 26.4561, lng: 74.6284, desc: "The holy shrine of Khwaja Moinuddin Chishti, one of the most sacred pilgrimage sites in India." },
                    { name: "Taragarh Fort", lat: 26.4468, lng: 74.6189, desc: "A historic fort built on a steep hill, offering panoramic views of the entire Ajmer city." },
                    { name: "Adhai Din Ka Jhopda", lat: 26.4552, lng: 74.6251, desc: "An early Indo-Islamic mosque reportedly constructed in just two and a half days." },
                    { name: "Ana Sagar Lake", lat: 26.4741, lng: 74.6258, desc: "A beautiful 12th-century artificial lake famous for its marble pavilions and sunset views." }
                ]
            }
        ];

        function App() {
            const [visited, setVisited] = useState(() => JSON.parse(localStorage.getItem('visited_v4') || '[]'));
            const [userLoc, setUserLoc] = useState(null);
            const [isTracking, setIsTracking] = useState(false);
            const [search, setSearch] = useState("");

            useEffect(() => {
                localStorage.setItem('visited_v4', JSON.stringify(visited));
            }, [visited]);

            const toggleGPS = () => {
                if (isTracking) { setIsTracking(false); setUserLoc(null); return; }
                navigator.geolocation.getCurrentPosition((pos) => {
                    setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                    setIsTracking(true);
                    navigator.geolocation.watchPosition(p => setUserLoc({ lat: p.coords.latitude, lng: p.coords.longitude }));
                }, () => alert("Enable GPS for radar"), { enableHighAccuracy: true });
            };

            const calculateDist = (lat1, lon1, lat2, lon2) => {
                const R = 6371;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            };

            const filtered = TRAVEL_DATA.map(g => ({
                ...g, spots: g.spots.filter(s => s.name.toLowerCase().includes(search.toLowerCase()))
            })).filter(g => g.spots.length > 0);

            return (
                <div className="min-h-screen max-w-xl mx-auto px-4 pt-4">
                    {/* Compact Modern Header */}
                    <header className="flex justify-between items-center py-4 sticky top-0 bg-[#020617]/90 backdrop-blur-md z-50">
                        <div>
                            <h1 className="text-xl font-black tracking-tighter text-white italic uppercase">Hubli Quest</h1>
                            <p className="text-[10px] font-bold text-slate-500 tracking-[0.2em]">{visited.length}/{TRAVEL_DATA.reduce((a,c)=>a+c.spots.length,0)} SPOTS</p>
                        </div>
                        <button onClick={toggleGPS} className={`w-11 h-11 rounded-xl flex items-center justify-center transition-all ${isTracking ? 'bg-indigo-600 shadow-lg shadow-indigo-500/30' : 'bg-slate-800'}`}>
                            <i className={`fas ${isTracking ? 'fa-satellite animate-pulse text-white' : 'fa-location-dot text-slate-400'}`}></i>
                        </button>
                    </header>

                    {/* Compact Search */}
                    <div className="relative mb-6">
                        <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 text-xs"></i>
                        <input 
                            value={search} onChange={e=>setSearch(e.target.value)}
                            placeholder="Find a monument..." 
                            className="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3 pl-11 pr-4 text-xs text-white focus:outline-none focus:ring-1 focus:ring-indigo-500/50 transition-all"
                        />
                    </div>

                    {/* Itinerary List */}
                    <main className="space-y-8">
                        {filtered.map((group, idx) => (
                            <div key={group.city} className="animate-slide-up" style={{animationDelay: `${idx*0.05}s`}}>
                                <div className="flex items-center gap-3 mb-4">
                                    <h2 className="text-[10px] font-black text-indigo-400 uppercase tracking-[0.3em]">{group.city}</h2>
                                    <div className="h-px flex-1 bg-slate-800"></div>
                                    <span className="text-[8px] font-bold text-slate-600 uppercase border border-slate-800 px-2 py-0.5 rounded-md">{group.transit}</span>
                                </div>
                                
                                <div className="grid gap-3">
                                    {group.spots.map(spot => {
                                        const isVisited = visited.includes(spot.name);
                                        const dist = userLoc ? calculateDist(userLoc.lat, userLoc.lng, spot.lat, spot.lng) : null;
                                        return (
                                            <div key={spot.name} className={`glass-card p-4 rounded-2xl flex items-center gap-4 ${isVisited ? 'opacity-40' : ''}`}>
                                                {/* Left Side: Check Button */}
                                                <button 
                                                    onClick={() => setVisited(v => v.includes(spot.name) ? v.filter(n=>n!==spot.name) : [...v, spot.name])}
                                                    className={`check-btn shrink-0 w-12 h-12 rounded-xl flex items-center justify-center ${isVisited ? 'active' : 'inactive'}`}
                                                >
                                                    <i className={`fas ${isVisited ? 'fa-check' : 'fa-circle-check opacity-20'}`}></i>
                                                </button>

                                                {/* Middle: Content */}
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center gap-2 mb-0.5">
                                                        <h4 className="text-sm font-bold text-slate-100 truncate">{spot.name}</h4>
                                                        {dist !== null && (
                                                            <span className="text-[8px] font-black text-indigo-400 uppercase">{dist < 1 ? `${Math.round(dist*1000)}m` : `${dist.toFixed(1)}km`}</span>
                                                        )}
                                                    </div>
                                                    <p className="text-[10px] text-slate-500 leading-relaxed line-clamp-2 italic">{spot.desc}</p>
                                                </div>

                                                {/* Right: Actions */}
                                                <div className="flex flex-col gap-2 shrink-0">
                                                    <a href={`https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}`} target="_blank" className="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-800 text-slate-400 hover:text-indigo-400 transition-colors">
                                                        <i className="fa-solid fa-diamond-turn-right text-xs"></i>
                                                    </a>
                                                    {/* New Transit Feature */}
                                                    <a href={`https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}&travelmode=transit`} target="_blank" className="w-8 h-8 flex items-center justify-center rounded-lg bg-indigo-500/10 text-indigo-500 hover:bg-indigo-500 hover:text-white transition-all">
                                                        <i className="fa-solid fa-train-subway text-[10px]"></i>
                                                    </a>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* Bottom Floating Nav */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-slate-900/90 backdrop-blur-xl border border-white/5 py-4 px-8 rounded-3xl flex justify-between shadow-2xl z-50">
                        <button onClick={()=>window.scrollTo({top:0, behavior:'smooth'})} className="flex flex-col items-center gap-1 text-indigo-500">
                            <i className="fas fa-compass text-sm"></i>
                            <span className="text-[8px] font-bold uppercase tracking-widest">Guide</span>
                        </button>
                        <button 
                            onClick={() => {
                                const next = TRAVEL_DATA.flatMap(g=>g.spots).find(s=>!visited.includes(s.name));
                                if(next) setSearch(next.name);
                            }}
                            className="flex flex-col items-center gap-1 text-slate-500"
                        >
                            <i className="fas fa-bolt text-sm"></i>
                            <span className="text-[8px] font-bold uppercase tracking-widest">Next Up</span>
                        </button>
                        <button onClick={() => confirm("Reset progress?") && setVisited([])} className="flex flex-col items-center gap-1 text-red-500/40">
                            <i className="fas fa-power-off text-sm"></i>
                            <span className="text-[8px] font-bold uppercase tracking-widest">Reset</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
