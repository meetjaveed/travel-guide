<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Travel Quest 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .city-gradient { background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .check-btn { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .check-btn.active { background-color: #22c55e; color: white; transform: scale(1.05); box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); border-color: #22c55e; }
        .check-btn.inactive { background-color: rgba(30, 41, 59, 0.6); color: rgba(148, 163, 184, 0.2); border: 1px solid rgba(255, 255, 255, 0.05); }
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #020617; }
        .content-padding { padding-top: 110px; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TRAVEL_DATA = [
            {
                city: "Agra",
                modes: ["Bus", "Auto", "Train"],
                spots: [
                    { name: "Taj Mahal", lat: 27.1751, lng: 78.0421, desc: "World-famous marble mausoleum and UNESCO site built by Shah Jahan. It is the ultimate masterpiece of Mughal architecture." },
                    { name: "Agra Fort", lat: 27.1795, lng: 78.0211, desc: "A massive red sandstone fortress serving as the main Mughal residence. It houses stunning palaces and royal audience halls." },
                    { name: "Itmad-ud-Daulah", lat: 27.1929, lng: 78.0311, desc: "The 'Baby Taj', recognized as the first Mughal structure made purely of marble. Features delicate pietra dura inlay work." },
                    { name: "Jama Masjid Agra", lat: 27.1858, lng: 78.0163, desc: "Grand 17th-century mosque built by Jahanara Begum. Known for its striking red sandstone design and large marble domes." },
                    { name: "Moti Masjid", lat: 27.1800, lng: 78.0220, desc: "The 'Pearl Mosque' inside Agra Fort, built by Shah Jahan. Renowned for its flawless white marble and elegant symmetry." },
                    { name: "Mehtab Bagh", lat: 27.1788, lng: 78.0423, desc: "Moonlight Garden offering the most iconic sunset view of the Taj Mahal. Designed as a traditional Mughal Charbagh." },
                    { name: "Ram Bagh", lat: 27.2000, lng: 78.0400, desc: "The oldest Mughal garden in India, established by Babur in 1528. Built with cooling water channels and lush greenery." }
                ]
            },
            {
                city: "Lucknow",
                modes: ["Metro", "Bus", "Auto", "Train"],
                spots: [
                    { name: "Bara Imambara", lat: 26.8689, lng: 80.9135, desc: "A colossal vaulted hall built without beams. Home to the legendary Bhulbhulaiya stone labyrinth that confuses even the experts." },
                    { name: "Chhota Imambara", lat: 26.8770, lng: 80.9048, desc: "The Palace of Lights, famous for its massive crystal chandeliers. Features stunning silver thrones and intricate Nawabi calligraphy." },
                    { name: "Rumi Darwaza", lat: 26.8684, lng: 80.9122, desc: "Imposing 60-foot gateway modeled after the Sublime Porte in Istanbul. It is the architectural signature of the city of Lucknow." },
                    { name: "The Residency", lat: 26.8631, lng: 80.9272, desc: "Ruined complex that served as the British headquarters during 1857. Now a peaceful historical park and museum of national history." },
                    { name: "Ambedkar Memorial Park", lat: 26.8454, lng: 80.9785, desc: "Massive public memorial built entirely with red sandstone from Rajasthan. Features vast lawns, stone elephants, and a grand stupa." },
                    { name: "Janeshwar Mishra Park", lat: 26.8400, lng: 81.0000, desc: "Asia's largest eco-friendly park with man-made lakes and jogging tracks. Acts as the primary green lung for the city of Lucknow." },
                    { name: "Dargah Dada Miyan", lat: 26.8521, lng: 80.9322, desc: "Highly revered Sufi shrine of Hazrat Shah Meena Shah in the old city. Attracts thousands of seekers of all faiths for spiritual peace." },
                    { name: "Shah Mina Shah Mazar", lat: 26.8500, lng: 80.9300, desc: "Resting place of the 15th-century Sufi saint and patron of Lucknow. A historic center for spiritual guidance and communal harmony." }
                ]
            },
            {
                city: "Bahraich",
                modes: ["Bus", "Auto"],
                spots: [
                    { name: "Dargah Syed Salar Masud Ghazi", lat: 27.5855, lng: 81.6033, desc: "Ancient shrine of the warrior saint, drawing massive crowds for the annual Jeth Mela. A symbol of deep faith in North India." },
                    { name: "Maneejri Masjid", lat: 27.5700, lng: 81.5900, desc: "Historic local mosque known for traditional Nawabi architecture. Serves as a vital spiritual heart for the people of Bahraich." },
                    { name: "Jama Masjid Bahraich", lat: 27.5750, lng: 81.6000, desc: "Main congregational mosque of the city with classic minarets. The primary site for weekly Friday prayers and religious festivals." }
                ]
            },
            {
                city: "Kanpur / Makanpur",
                modes: ["Train", "Bus", "Auto"],
                spots: [
                    { name: "Dargah Zinda Shah Madar", lat: 26.8373, lng: 80.0465, desc: "World-renowned shrine of the Madariyya Sufi order founder in Makanpur. One of India's oldest and most powerful Sufi centers." },
                    { name: "Kanpur Memorial Church", lat: 26.4500, lng: 80.3600, desc: "Stunning Gothic Revival church built in 1875 for the fallen of 1857. Features remarkable stained glass and detailed brick carvings." },
                    { name: "JK Temple", lat: 26.4754, lng: 80.3060, desc: "Majestic white marble temple dedicated to Lord Radhakrishna. Seamlessly blends ancient Indian and modern structural design styles." },
                    { name: "Allen Forest Zoo", lat: 26.5050, lng: 80.3000, desc: "Unique natural forest zoo providing spacious habitats for endangered wildlife. A major center for nature conservation in the region." },
                    { name: "Nana Rao Park", lat: 26.4700, lng: 80.3500, desc: "Historical park built on the site of the 1857 uprising. Now a serene garden dedicated to the hero of the first war of independence." }
                ]
            },
            {
                city: "Kichocha",
                modes: ["Bus", "Auto", "Train"],
                spots: [
                    { name: "Dargah Makhdoom Ashraf Semnani", lat: 26.4258, lng: 82.7569, desc: "Globally famous Sufi shrine known for powerful spiritual healing. The adjacent holy water pond is believed to have curative powers." }
                ]
            },
            {
                city: "Bareilly",
                modes: ["Bus", "Auto", "Train"],
                spots: [
                    { name: "Dargah-e-Ala Hazrat", lat: 28.3751, lng: 79.4144, desc: "Shrine of Imam Ahmed Raza Khan, the renowned Islamic scholar. Global center for the Barelvi movement and theological research." },
                    { name: "Dargah Shah Sharafat Ali Mia", lat: 28.3600, lng: 79.4200, desc: "Prominent Sufi shrine noted for its beautiful and spiritual atmosphere. Site of deep devotion attracting pilgrims throughout the year." },
                    { name: "Phool Bagh", lat: 28.3700, lng: 79.4100, desc: "Lush city garden in Bareilly offering a tranquil space for morning walks. Features a variety of seasonal flora and peaceful fountains." },
                    { name: "Akshar Vihar", lat: 28.3500, lng: 79.4300, desc: "Popular recreational park centered around a large scenic lake. Known for boating facilities and a favorite spot for family outings." }
                ]
            },
            {
                city: "Haridwar / Roorkee",
                modes: ["Train", "Bus", "Auto"],
                spots: [
                    { name: "Piran Kaliyar Sharif", lat: 29.9161, lng: 77.9351, desc: "13th-century shrine of Alauddin Ali Ahmed Sabir Kaliyari. One of India's most sacred Sufi sites, renowned for its spiritual aura." },
                    { name: "Har Ki Pauri", lat: 29.9564, lng: 78.1707, desc: "Famous sacred ghat on the Ganges where the evening Aarti is performed. Believed to be the entry point of the holy river into the plains." }
                ]
            },
            {
                city: "Sadhaura",
                modes: ["Bus", "Auto"],
                spots: [
                    { name: "Dargah of Shah Qumais", lat: 30.3792, lng: 77.2025, desc: "Historic Sufi shrine of the Qadiriya order in Gumaisia region. A significant spiritual landmark in the northern belt of Haryana state." }
                ]
            },
            {
                city: "Panipat",
                modes: ["Train", "Bus", "Auto"],
                spots: [
                    { name: "Kala Amb", lat: 29.4000, lng: 76.9900, desc: "Memorial site marking the spot of the bloody 3rd Battle of Panipat in 1761. Pays tribute to the bravery of the Maratha warriors." },
                    { name: "Panipat Museum", lat: 29.3950, lng: 76.9800, desc: "Museum documenting the three pivotal battles that reshaped India. Displays ancient weaponry, armor, and strategic military maps." },
                    { name: "Dargah Bu Ali Shah Qalandar", lat: 29.3909, lng: 76.9744, desc: "Shrine of the 13th-century Sufi saint from Azerbaijan. A center for spiritual seekers and harmony among all religious faiths." },
                    { name: "Ibrahim Lodhi’s Tomb", lat: 29.3920, lng: 76.9750, desc: "Final resting place of the Sultan killed during the 1st Battle of Panipat. A dignified, simple structure on a high stone platform." }
                ]
            },
            {
                city: "Delhi",
                modes: ["Metro", "Train", "Bus", "Auto"],
                spots: [
                    { name: "Dargah Bakhtiyar Kaki", lat: 28.5220, lng: 77.1840, desc: "Delhi's oldest Sufi shrine dedicated to the successor of Khwaja Moinuddin Chishti. Located in the peaceful Mehrauli sanctuary." },
                    { name: "Chirag-Dehlavi Dargah", lat: 28.5410, lng: 77.2380, desc: "Holy resting place of the 14th-century saint known as the 'Lamp of Delhi'. Highly revered historical sanctuary in South Delhi." },
                    { name: "Red Fort", lat: 28.6562, lng: 77.2410, desc: "UNESCO World Heritage site and Mughal imperial seat for 200 years. Iconic symbol of India's independence and architectural might." },
                    { name: "Humayun’s Tomb", lat: 28.5933, lng: 77.2507, desc: "First magnificent garden-tomb of the Mughal era. Architectural masterpiece that served as the primary inspiration for the Taj Mahal." },
                    { name: "Qutub Minar", lat: 28.5244, lng: 77.1855, desc: "Tallest brick minaret in the world, built in 1193. The complex features ancient ruins and the legendary rust-free Iron Pillar." },
                    { name: "Jama Masjid Delhi", lat: 28.6507, lng: 77.2334, desc: "One of India's largest mosques, commissioned by Emperor Shah Jahan. Courtyard can accommodate over 25,000 devotees for prayer." },
                    { name: "Nizamuddin Dargah", lat: 28.5913, lng: 77.2425, desc: "Shrine of world-famous saint Nizamuddin Auliya. Renowned globally for its soulful evening Qawwali sessions and spiritual peace." },
                    { name: "Lotus Temple", lat: 28.5535, lng: 77.2588, desc: "Striking Bahá'í House of Worship shaped like a blooming lotus. Site of silent meditation and prayer open to people of all religions." },
                    { name: "Lodhi Gardens", lat: 28.5931, lng: 77.2197, desc: "Vast city park containing historical tombs from the Lodhi dynasty. Popular spot for early morning walkers and history enthusiasts." },
                    { name: "Garden of Five Senses", lat: 28.5100, lng: 77.2000, desc: "Uniquely designed park in Saket meant to stimulate all human senses. Features murals, sculptures, and varied themed floral gardens." }
                ]
            },
            {
                city: "Ajmer",
                modes: ["Train", "Bus", "Auto"],
                spots: [
                    { name: "Ajmer Sharif Dargah", lat: 26.4561, lng: 74.6284, desc: "Sacred shrine of Khwaja Moinuddin Chishti, Gharib Nawaz. One of the most visited and holiest pilgrimage sites in the world." },
                    { name: "Taragarh Fort", lat: 26.4468, lng: 74.6189, desc: "Historic hill fort offering breathtaking panoramic views of Ajmer. Built in the 11th century, it is one of India's oldest hill forts." },
                    { name: "Adhai Din Ka Jhopda", lat: 26.4552, lng: 74.6251, desc: "Indo-Islamic mosque built in just 2.5 days by Qutb-ud-Din Aibak. Features intricately carved pillars and unique arched screens." },
                    { name: "Ana Sagar Lake", lat: 26.4741, lng: 74.6258, desc: "12th-century artificial lake famous for its elegant marble pavilions. A popular local spot for evening strolls and sunset watching." },
                    { name: "Daulat Bagh", lat: 26.4750, lng: 74.6260, desc: "Serene garden adjacent to Ana Sagar Lake built by Emperor Jahangir. Offers a lush green escape with marble pavilions by the water." }
                ]
            },
            {
                city: "Salwar Sharif",
                modes: ["Bus", "Auto"],
                spots: [
                    { name: "Dargah Fakhruddin Chishti", lat: 26.5500, lng: 74.8000, desc: "Shrine of the eldest son of Khwaja Moinuddin Chishti. A significant Sufi pilgrimage site maintained in the Chishtiya tradition." }
                ]
            },
            {
                city: "Pushkar",
                modes: ["Bus", "Auto"],
                spots: [
                    { name: "Brahma Temple", lat: 26.4900, lng: 74.5500, desc: "One of the world's very few dedicated temples to Lord Brahma. A major site for pilgrims visiting the holy town of Pushkar." },
                    { name: "Pushkar Lake Ghats", lat: 26.4883, lng: 74.5518, desc: "Sacred lake surrounded by 52 bathing ghats for ritual dips. The spiritual heart of the town and host of the famous annual fair." }
                ]
            }
        ];

        function App() {
            const [visited, setVisited] = useState(() => JSON.parse(localStorage.getItem('v_v9') || '[]'));
            const [userLoc, setUserLoc] = useState(null);
            const [isTracking, setIsTracking] = useState(false);
            const [search, setSearch] = useState("");
            const [expanded, setExpanded] = useState({});

            useEffect(() => { localStorage.setItem('v_v9', JSON.stringify(visited)); }, [visited]);

            const toggleGPS = () => {
                if (isTracking) { setIsTracking(false); setUserLoc(null); return; }
                navigator.geolocation.getCurrentPosition((pos) => {
                    setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                    setIsTracking(true);
                    navigator.geolocation.watchPosition(p => setUserLoc({ lat: p.coords.latitude, lng: p.coords.longitude }), null, {enableHighAccuracy: true});
                }, () => alert("Enable GPS"), { enableHighAccuracy: true });
            };

            const calculateDist = (lat1, lon1, lat2, lon2) => {
                const R = 6371;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            };

            const filtered = TRAVEL_DATA.map(g => ({
                ...g, spots: g.spots.filter(s => s.name.toLowerCase().includes(search.toLowerCase()) || g.city.toLowerCase().includes(search.toLowerCase()))
            })).filter(g => g.spots.length > 0);

            return (
                <div className="min-h-screen">
                    {/* Fixed Top Section */}
                    <div className="fixed-header px-4 pt-4 pb-3 border-b border-white/5 shadow-2xl">
                        <header className="flex justify-between items-center mb-3">
                            <div>
                                <h1 className="text-lg font-extrabold tracking-tighter text-white italic uppercase leading-none">Quest Tracker</h1>
                                <p className="text-[8px] font-black text-indigo-400 tracking-widest mt-1">{visited.length} VISITED</p>
                            </div>
                            <button onClick={toggleGPS} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${isTracking ? 'bg-indigo-600 shadow-[0_0_15px_rgba(79,70,229,0.4)]' : 'bg-slate-800'}`}>
                                <i className={`fas ${isTracking ? 'fa-satellite animate-pulse' : 'fa-location-dot'} text-sm`}></i>
                            </button>
                        </header>
                        <div className="relative">
                            <i className="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-600 text-[10px]"></i>
                            <input 
                                value={search} onChange={e=>setSearch(e.target.value)}
                                placeholder="Search cities or monuments..." 
                                className="w-full bg-slate-900 border border-white/5 rounded-xl py-2 pl-9 pr-4 text-[10px] text-white focus:outline-none"
                            />
                        </div>
                    </div>

                    <main className="content-padding px-4 pb-28 space-y-10">
                        {filtered.map((group) => (
                            <div key={group.city} className="space-y-4">
                                <div className="flex items-center justify-between px-1">
                                    <h2 className="city-gradient font-black text-[11px] uppercase tracking-widest">{group.city}</h2>
                                    <div className="flex gap-1">
                                        {group.modes.map(m => (
                                            <span key={m} className="text-[7px] font-bold text-slate-500 border border-white/5 px-1.5 py-0.5 rounded bg-slate-900/50 uppercase">
                                                {m === "Metro" && <i className="fas fa-train-subway mr-1"></i>}
                                                {m === "Bus" && <i className="fas fa-bus mr-1"></i>}
                                                {m === "Auto" && <i className="fas fa-taxi mr-1"></i>}
                                                {m === "Train" && <i className="fas fa-train mr-1"></i>}
                                                {m}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="grid gap-3">
                                    {group.spots.map(spot => {
                                        const isVisited = visited.includes(spot.name);
                                        const dist = userLoc ? calculateDist(userLoc.lat, userLoc.lng, spot.lat, spot.lng) : null;
                                        const isExp = expanded[spot.name];

                                        return (
                                            <div key={spot.name} className={`glass p-3 rounded-2xl flex items-start gap-4 transition-all ${isVisited ? 'opacity-40 grayscale-[0.5]' : ''}`}>
                                                
                                                {/* Logic for KM Section */}
                                                <div className="flex flex-col items-center shrink-0 w-14 pt-1">
                                                    <span className={`text-[7px] font-black mb-2 text-center leading-none ${isTracking ? 'text-green-400' : 'text-slate-600'}`}>
                                                        {isTracking ? (dist !== null ? (dist < 1 ? `${Math.round(dist*1000)}m` : `${dist.toFixed(1)}km`) : '---') : 'Location Off'}
                                                    </span>
                                                    <button 
                                                        onClick={() => setVisited(v => v.includes(spot.name) ? v.filter(n=>n!==spot.name) : [...v, spot.name])}
                                                        className={`check-btn w-10 h-10 rounded-xl flex items-center justify-center border ${isVisited ? 'active' : 'inactive'}`}
                                                    >
                                                        <i className={`fas ${isVisited ? 'fa-check' : 'fa-plus'} text-xs`}></i>
                                                    </button>
                                                </div>

                                                <div className="flex-1 min-w-0 pr-1">
                                                    <h4 className="text-xs font-bold text-slate-100 truncate mb-1">{spot.name}</h4>
                                                    <p className={`text-[10px] text-slate-400 leading-tight italic ${isExp ? '' : 'line-clamp-2'}`}>
                                                        {spot.desc}
                                                    </p>
                                                    <button 
                                                        onClick={() => setExpanded(prev => ({ ...prev, [spot.name]: !prev[spot.name] }))}
                                                        className="text-[9px] font-bold text-indigo-400 mt-1 uppercase"
                                                    >
                                                        {isExp ? 'View Less' : 'View More'}
                                                    </button>
                                                </div>

                                                <div className="flex flex-col gap-2 shrink-0">
                                                    <a href={`https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}`} target="_blank" className="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-800 text-slate-400">
                                                        <i className="fa-solid fa-diamond-turn-right text-[10px]"></i>
                                                    </a>
                                                    <a href={`https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}&travelmode=transit`} target="_blank" className="w-8 h-8 flex items-center justify-center rounded-lg bg-indigo-900/40 text-indigo-400 border border-indigo-500/20">
                                                        <i className="fa-solid fa-train-subway text-[10px]"></i>
                                                    </a>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-4 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-slate-900/90 backdrop-blur-2xl border border-white/5 py-3 px-8 rounded-full flex justify-between shadow-2xl z-50">
                        <button onClick={()=>window.scrollTo({top:0, behavior:'smooth'})} className="flex flex-col items-center gap-1 text-indigo-500">
                            <i className="fas fa-compass text-sm"></i>
                            <span className="text-[7px] font-bold uppercase">Guide</span>
                        </button>
                        <button onClick={()=>confirm("Reset progress?") && setVisited([])} className="flex flex-col items-center gap-1 text-red-500/40">
                            <i className="fas fa-power-off text-sm"></i>
                            <span className="text-[7px] font-bold uppercase">Reset</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
