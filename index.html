<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hubli Travel Quest 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .city-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-fill { transition: width 0.8s ease-in-out; }
        .spot-item.visited { opacity: 0.6; background-color: #f3f4f6; }
        .spot-item.visited h4 { text-decoration: line-through; color: #9ca3af; }
        @keyframes pulse-custom {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .checking-anim { animation: pulse-custom 1.5s infinite; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24">

    <!-- Header Section -->
    <div class="bg-indigo-700 text-white pt-10 pb-12 px-6 rounded-b-[40px] shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 right-0 p-8 opacity-10">
            <i class="fas fa-mosque fa-6x"></i>
        </div>
        
        <div class="flex justify-between items-center relative z-10">
            <div>
                <h1 class="text-2xl font-black tracking-tight">HUBLI TRAVEL</h1>
                <p class="text-indigo-200 text-sm font-medium">Round-Trip Tracker 2026</p>
            </div>
            <button onclick="handleCheckIn()" id="gps-btn" class="bg-white text-indigo-700 p-4 rounded-2xl shadow-lg active:scale-90 transition-transform">
                <i class="fas fa-location-crosshairs fa-xl"></i>
            </button>
        </div>

        <div class="mt-8 relative z-10">
            <div class="flex justify-between text-xs font-bold uppercase tracking-widest mb-2 text-indigo-100">
                <span id="visited-count">0 VISITED</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="h-3 bg-indigo-900/40 rounded-full overflow-hidden border border-indigo-400/20">
                <div id="progress-bar" class="progress-fill h-full bg-green-400 w-0"></div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-50 hidden">
        <div id="toast-content" class="p-4 rounded-2xl shadow-2xl text-white font-bold text-center text-sm flex items-center justify-center gap-2">
            <!-- Content via JS -->
        </div>
    </div>

    <!-- Main Itinerary -->
    <div id="itinerary-list" class="px-4 mt-6 space-y-4">
        <!-- Generated by JavaScript -->
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/90 backdrop-blur-xl border border-gray-200 shadow-2xl rounded-full p-2 flex justify-between items-center z-40">
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="flex-1 py-3 flex flex-col items-center text-indigo-600">
            <i class="fas fa-route text-xl"></i>
            <span class="text-[9px] font-black uppercase mt-1">Route</span>
        </button>
        <button onclick="scrollToNext()" class="flex-1 py-3 flex flex-col items-center text-gray-400">
            <i class="fas fa-forward-step text-xl"></i>
            <span class="text-[9px] font-black uppercase mt-1">Next Up</span>
        </button>
        <button onclick="resetData()" class="flex-1 py-3 flex flex-col items-center text-gray-400">
            <i class="fas fa-rotate-left text-xl"></i>
            <span class="text-[9px] font-black uppercase mt-1">Reset</span>
        </button>
    </div>

    <script>
        const ITINERARY = [
            { city: "Agra", spots: [
                { name: "Taj Mahal", type: "Palace/Garden", lat: 27.1751, lng: 78.0421 },
                { name: "Agra Fort", type: "History", lat: 27.1795, lng: 78.0211 },
                { name: "Jama Masjid Agra", type: "Masjid", lat: 27.1858, lng: 78.0163 }
            ]},
            { city: "Lucknow", spots: [
                { name: "Bara Imambara", type: "Heritage", lat: 26.8689, lng: 80.9135 },
                { name: "Dargah Dada Miyan", type: "Dargah", lat: 26.8521, lng: 80.9322 },
                { name: "Rumi Darwaza", type: "Monument", lat: 26.8684, lng: 80.9122 }
            ]},
            { city: "Bahraich", spots: [
                { name: "Dargah Syed Salar Masood Ghazi", type: "Dargah", lat: 27.5855, lng: 81.6033 }
            ]},
            { city: "Makanpur", spots: [
                { name: "Dargah Zinda Shah Madar", type: "Dargah", lat: 26.8373, lng: 80.0465 }
            ]},
            { city: "Kichocha", spots: [
                { name: "Dargah Makhdoom Ashraf Semnani", type: "Dargah", lat: 26.4258, lng: 82.7569 }
            ]},
            { city: "Bareilly", spots: [
                { name: "Dargah-e-Ala Hazrat", type: "Dargah", lat: 28.3751, lng: 79.4144 }
            ]},
            { city: "Piran Kaliyar", spots: [
                { name: "Sabir Pak Dargah", type: "Dargah", lat: 29.9161, lng: 77.9351 }
            ]},
            { city: "Delhi", spots: [
                { name: "Nizamuddin Dargah", type: "Dargah", lat: 28.5913, lng: 77.2425 },
                { name: "Jama Masjid Delhi", type: "Masjid", lat: 28.6507, lng: 77.2334 }
            ]},
            { city: "Ajmer", spots: [
                { name: "Ajmer Sharif Dargah", type: "Dargah", lat: 26.4561, lng: 74.6284 },
                { name: "Adhai Din Ka Jhopda", type: "History/Masjid", lat: 26.4552, lng: 74.6251 },
                { name: "Pushkar Lake", type: "Nature", lat: 26.4883, lng: 74.5518 }
            ]}
        ];

        let visited = JSON.parse(localStorage.getItem('hubli_tour_v4') || '[]');

        function init() {
            const list = document.getElementById('itinerary-list');
            list.innerHTML = '';
            
            ITINERARY.forEach((city, cityIdx) => {
                const cityDiv = document.createElement('div');
                cityDiv.className = 'bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden city-card';
                cityDiv.id = `city-${city.city.toLowerCase()}`;
                
                const cityVisited = city.spots.filter(s => visited.includes(s.name)).length;
                
                cityDiv.innerHTML = `
                    <div class="p-5 flex items-center justify-between cursor-pointer" onclick="toggleCity(this)">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600">
                                <i class="fas fa-map-location-dot text-lg"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-gray-800 text-lg">${city.city}</h3>
                                <p class="text-[10px] font-black uppercase text-gray-400 tracking-tighter">${cityVisited}/${city.spots.length} VISITED</p>
                            </div>
                        </div>
                        <i class="fas fa-chevron-down text-gray-300 transition-transform arrow"></i>
                    </div>
                    <div class="px-5 pb-5 space-y-3 hidden spot-container">
                        ${city.spots.map(spot => renderSpot(spot)).join('')}
                    </div>
                `;
                list.appendChild(cityDiv);
            });
            updateProgress();
        }

        function renderSpot(spot) {
            const isVisited = visited.includes(spot.name);
            return `
                <div class="spot-item flex items-center gap-4 p-4 rounded-2xl border ${isVisited ? 'visited border-gray-100' : 'bg-indigo-50/40 border-indigo-100 shadow-sm'}">
                    <button onclick="toggleSpot('${spot.name}')" class="text-2xl transition-colors ${isVisited ? 'text-green-500' : 'text-indigo-200'}">
                        <i class="fas ${isVisited ? 'fa-circle-check' : 'fa-circle'}"></i>
                    </button>
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-sm text-gray-800">${spot.name}</h4>
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}" target="_blank" class="p-2 text-indigo-600 bg-white rounded-xl shadow-sm">
                                <i class="fas fa-diamond-turn-right text-xs"></i>
                            </a>
                        </div>
                        <span class="text-[9px] font-black uppercase bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full mt-1 inline-block">${spot.type}</span>
                    </div>
                </div>
            `;
        }

        function toggleCity(el) {
            const container = el.nextElementSibling;
            const arrow = el.querySelector('.arrow');
            const isHidden = container.classList.contains('hidden');
            
            // Close others
            document.querySelectorAll('.spot-container').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.arrow').forEach(a => a.classList.remove('rotate-180'));
            
            if(isHidden) {
                container.classList.remove('hidden');
                arrow.classList.add('rotate-180');
            }
        }

        function toggleSpot(name) {
            if(visited.includes(name)) {
                visited = visited.filter(s => s !== name);
            } else {
                visited.push(name);
            }
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('hubli_tour_v4', JSON.stringify(visited));
            init();
        }

        function updateProgress() {
            const total = ITINERARY.reduce((acc, c) => acc + c.spots.length, 0);
            const percent = Math.round((visited.length / total) * 100);
            
            document.getElementById('visited-count').innerText = `${visited.length} VISITED`;
            document.getElementById('progress-percent').innerText = `${percent}%`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        function showToast(text, type) {
            const toast = document.getElementById('toast');
            const content = document.getElementById('toast-content');
            
            content.className = `p-4 rounded-2xl shadow-2xl text-white font-bold text-center text-sm flex items-center justify-center gap-2 ${type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'}`;
            content.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${text}`;
            
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function handleCheckIn() {
            const btn = document.getElementById('gps-btn');
            if (!navigator.geolocation) {
                showToast("GPS not supported on this device", "error");
                return;
            }

            btn.classList.add('checking-anim', 'bg-indigo-100');
            showToast("Verifying location...", "info");

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const { latitude, longitude } = pos.coords;
                    let found = false;
                    
                    ITINERARY.forEach(city => {
                        city.spots.forEach(spot => {
                            const dist = getDistance(latitude, longitude, spot.lat, spot.lng);
                            if (dist < 1.5 && !visited.includes(spot.name)) {
                                visited.push(spot.name);
                                showToast(`Checked in: ${spot.name}`, "success");
                                found = true;
                            }
                        });
                    });

                    if (!found) showToast("You aren't near any new spots (1.5km)", "info");
                    btn.classList.remove('checking-anim', 'bg-indigo-100');
                    saveAndRefresh();
                },
                (err) => {
                    showToast("GPS Access Denied", "error");
                    btn.classList.remove('checking-anim', 'bg-indigo-100');
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function scrollToNext() {
            const nextCity = ITINERARY.find(c => c.spots.some(s => !visited.includes(s.name)));
            if(nextCity) {
                const el = document.getElementById(`city-${nextCity.city.toLowerCase()}`);
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                if(el.querySelector('.spot-container').classList.contains('hidden')) {
                    toggleCity(el.firstElementChild);
                }
            }
        }

        function resetData() {
            if(confirm("Erase all travel history?")) {
                visited = [];
                saveAndRefresh();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
