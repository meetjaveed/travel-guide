<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panduan Perjalanan Hubli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .glass-card:active {
            transform: scale(0.98);
            background: rgba(30, 41, 59, 0.8);
        }

        .city-gradient {
            background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-bar {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TRAVEL_DATA = [
            {
                city: "Agra",
                spots: [
                    { name: "Taj Mahal", lat: 27.1751, lng: 78.0421, desc: "Mausoleum marmer putih megah yang dibangun oleh Shah Jahan untuk mengenang istrinya. Ini adalah mahakarya arsitektur Mughal dan situs Warisan Dunia UNESCO." },
                    { name: "Benteng Agra", lat: 27.1795, lng: 78.0211, desc: "Benteng batu pasir merah bersejarah yang berfungsi sebagai kediaman utama kaisar Mughal. Di dalamnya terdapat berbagai istana seperti Khas Mahal dan Istana Jahangir." },
                    { name: "Itmad-ud-Daulah (Baby Taj)", lat: 27.1929, lng: 78.0311, desc: "Sering disebut sebagai 'Baby Taj', makam ini adalah struktur Mughal pertama yang seluruhnya terbuat dari marmer. Memiliki hiasan tatahan halus dan terletak di tepi sungai Yamuna." },
                    { name: "Jama Masjid", lat: 27.1858, lng: 78.0163, desc: "Masjid megah dari abad ke-17 yang dibangun oleh putri Shah Jahan, Jahanara Begum. Dikenal dengan struktur batu pasir merah dan kubah marmernya." },
                    { name: "Moti Masjid", lat: 27.1800, lng: 78.0220, desc: "Masjid Mutiara yang terletak di dalam Benteng Agra, dikenal karena arsitektur marmer putihnya yang murni. Dibangun oleh Shah Jahan untuk anggota istana kerajaan." },
                    { name: "Mehtab Bagh", lat: 27.1788, lng: 78.0423, desc: "Taman Cahaya Bulan yang terletak di tepi seberang sungai Yamuna, menawarkan pemandangan spektakuler Taj Mahal. Merupakan taman Mughal terakhir dari sebelas taman yang dibangun." },
                    { name: "Ram Bagh", lat: 27.2000, lng: 78.0400, desc: "Taman Mughal tertua di India, awalnya dirancang oleh Kaisar Babur pada tahun 1528. Dirancang dengan gaya Charbagh tradisional dengan saluran air yang menyejukkan." }
                ]
            },
            {
                city: "Lucknow",
                spots: [
                    { name: "Bara Imambara", lat: 26.8689, lng: 80.9135, desc: "Aula pertemuan megah dengan ruang berkubah besar tanpa tiang penyangga. Di dalamnya terdapat Bhulbhulaiya yang terkenal, sebuah labirin koridor yang rumit." },
                    { name: "Chhota Imambara", lat: 26.8770, lng: 80.9048, desc: "Juga dikenal sebagai Istana Cahaya, terkenal dengan lampu kristal dan takhta peraknya yang rumit. Dibangun oleh Muhammad Ali Shah dengan kaligrafi yang indah." },
                    { name: "Rumi Darwaza", lat: 26.8684, lng: 80.9122, desc: "Gerbang megah yang menjadi ikon Lucknow, meniru gerbang Sublime Porte di Istanbul. Berdiri setinggi enam puluh kaki dan menampilkan arsitektur Awadhi yang khas." },
                    { name: "The Residency", lat: 26.8631, lng: 80.9272, desc: "Sekelompok reruntuhan yang berfungsi sebagai kediaman Jenderal Residen Inggris. Memainkan peran penting selama pemberontakan 1857 dan sekarang menjadi monumen yang dilindungi." },
                    { name: "Ambedkar Memorial Park", lat: 26.8454, lng: 80.9785, desc: "Taman umum dan peringatan besar yang seluruhnya dibangun dari batu pasir merah Rajasthan. Menampilkan halaman luas, patung gajah, dan stupa peringatan megah." },
                    { name: "Janeshwar Mishra Park", lat: 26.8400, lng: 81.0000, desc: "Taman ramah lingkungan yang diklaim sebagai yang terbesar di Asia, memiliki lintasan lari dan danau buatan. Menjadi paru-paru hijau yang luas bagi kota Lucknow." },
                    { name: "Dargah Dada Miyan", lat: 26.8521, lng: 80.9322, desc: "Kuil Sufi Hazrat Shah Meena Shah yang sangat dihormati, terletak di kota tua. Menarik pengunjung dari berbagai kalangan yang mencari kedamaian spiritual." },
                    { name: "Shah Mina Shah Mazar", lat: 26.8500, lng: 80.9300, desc: "Tempat peristirahatan orang suci Sufi abad ke-15, dikenal sebagai pelindung kota Lucknow. Kuil ini menjadi pusat bimbingan spiritual dan harmoni komunal." }
                ]
            },
            {
                city: "Bahraich",
                spots: [
                    { name: "Dargah Syed Salar Masood Ghazi", lat: 27.5855, lng: 81.6033, desc: "Kuil kuno santo pejuang abad ke-11, dikunjungi oleh ribuan orang selama Jeth Mela tahunan. Simbol kepercayaan dan sinkretisme agama di wilayah tersebut." },
                    { name: "Maneejri Masjid", lat: 27.5700, lng: 81.5900, desc: "Masjid bersejarah lokal yang dikenal karena arsitektur tradisional dan kepentingan komunitasnya. Berfungsi sebagai pusat spiritual bagi penduduk Bahraich." },
                    { name: "Jama Masjid Bahraich", lat: 27.5750, lng: 81.6000, desc: "Masjid jemaah pusat kota, menampilkan menara dan kubah klasik. Merupakan situs utama untuk salat Jumat dan festival Islam besar." }
                ]
            },
            {
                city: "Kanpur / Makanpur",
                spots: [
                    { name: "Dargah Zinda Shah Madar", lat: 26.8373, lng: 80.0465, desc: "Kuil Sufi ternama di dunia yang merupakan pendiri tarekat Sufi Madariyya di Makanpur. Salah satu pusat Sufi tertua dan paling menonjol di India." },
                    { name: "Gereja Memorial Kanpur", lat: 26.4500, lng: 80.3600, desc: "Dibangun tahun 1875 dengan gaya Kebangkitan Gotik untuk menghormati tentara Inggris yang gugur pada 1857. Memiliki jendela kaca patri dan pengerjaan bata yang detail." },
                    { name: "Kuil JK", lat: 26.4754, lng: 80.3060, desc: "Kuil marmer putih menakjubkan yang didedikasikan untuk Dewa Radhakrishna. Dikelilingi oleh taman yang asri dan merupakan landmark utama di Kanpur." },
                    { name: "Allen Forest Zoo", lat: 26.5050, lng: 80.3000, desc: "Salah satu dari sedikit kebun binatang di India yang dibuat di hutan alami. Menjadi tempat rekreasi utama dan pusat konservasi satwa liar di Kanpur." },
                    { name: "Taman Nana Rao", lat: 26.4700, lng: 80.3500, desc: "Taman bersejarah yang dibangun di lokasi pembantaian Bibighar 1857, sekarang didedikasikan untuk Nana Sahib. Berfungsi sebagai taman kota yang tenang." }
                ]
            },
            {
                city: "Kichocha (Akbarpur)",
                spots: [
                    { name: "Dargah Makhdoom Ashraf Semnani", lat: 26.4258, lng: 82.7569, desc: "Kuil Sufi terkenal di dunia yang dikenal dengan penyembuhan spiritual dan ketenangannya. Air suci (Neer) dari kolam di dekatnya dipercaya memiliki khasiat penyembuhan." }
                ]
            },
            {
                city: "Bareilly",
                spots: [
                    { name: "Dargah-e-Ala Hazrat", lat: 28.3751, lng: 79.4144, desc: "Kuil Imam Ahmed Raza Khan, cendekiawan Islam berpengaruh dari abad ke-19. Menjadi pusat global untuk gerakan Barelvi dan pembelajaran Islam." },
                    { name: "Dargah Shah Sharafat Ali Mia", lat: 28.3600, lng: 79.4200, desc: "Kuil Sufi terkemuka yang didedikasikan untuk Shah Sharafat Ali, dikenal karena arsitekturnya yang indah. Situs spiritual yang mendalam bagi masyarakat lokal." },
                    { name: "Phool Bagh", lat: 28.3700, lng: 79.4100, desc: "Taman umum yang terawat baik di Bareilly menawarkan lingkungan yang tenang untuk rekreasi. Memiliki berbagai jenis flora dan populer untuk jalan pagi." },
                    { name: "Akshar Vihar", lat: 28.3500, lng: 79.4300, desc: "Taman rekreasi yang berpusat di sekitar danau besar, populer untuk naik perahu dan tamasya keluarga. Salah satu ruang terbuka hijau utama di Bareilly." }
                ]
            },
            {
                city: "Haridwar / Roorkee",
                spots: [
                    { name: "Piran Kaliyar Sharif", lat: 29.9161, lng: 77.9351, desc: "Kuil abad ke-13 dari Alauddin Ali Ahmed Sabir Kaliyari dekat Roorkee. Salah satu situs Sufi paling suci di India dengan aura spiritual yang kuat." },
                    { name: "Har Ki Pauri", lat: 29.9564, lng: 78.1707, desc: "Ghat paling terkenal di tepi sungai Gangga tempat pemujaan Aarti malam dilakukan. Dipercaya sebagai titik di mana sungai memasuki dataran rendah." }
                ]
            },
            {
                city: "Sadhaura (near Ambala)",
                spots: [
                    { name: "Dargah of Shah Qumais", lat: 30.3792, lng: 77.2025, desc: "Kuil Sufi bersejarah di Sadhaura milik tarekat Qadiriya. Merupakan landmark spiritual penting bagi wilayah Gumaisia dan Haryana utara." }
                ]
            },
            {
                city: "Panipat",
                spots: [
                    { name: "Kala Amb", lat: 29.4000, lng: 76.9900, desc: "Situs peringatan yang menandai lokasi Pertempuran Panipat ke-3 tahun 1761. Berfungsi sebagai penghormatan kepada prajurit Maratha yang bertempur dengan gagah berani." },
                    { name: "Museum Panipat", lat: 29.3950, lng: 76.9800, desc: "Museum yang didedikasikan untuk sejarah tiga pertempuran legendaris di Panipat. Menampilkan artefak, senjata, dan peta masa lalu militer wilayah tersebut." },
                    { name: "Dargah Bu Ali Shah Qalandar", lat: 29.3909, lng: 76.9744, desc: "Kuil santo Sufi abad ke-13 dari Azerbaijan yang menetap di Panipat. Menjadi pusat spiritualitas dan menarik pengunjung dari berbagai keyakinan." },
                    { name: "Makam Ibrahim Lodhi", lat: 29.3920, lng: 76.9750, desc: "Tempat peristirahatan terakhir Sultan terakhir dari dinasti Lodi, gugur dalam Pertempuran Panipat ke-1. Berupa struktur persegi panjang sederhana di atas panggung tinggi." }
                ]
            },
            {
                city: "Delhi",
                spots: [
                    { name: "Dargah Hazrat Qutubuddin Bakhtiyar Kaki", lat: 28.5220, lng: 77.1840, desc: "Kuil Sufi tertua di Delhi yang didedikasikan untuk penerus spiritual Khwaja Moinuddin Chishti. Terletak di Mehrauli dan merupakan situs kedamaian spiritual yang tinggi." },
                    { name: "Hazrat Khwaja Nasiruddin Mahmood Chirag-Dehlavi Dargah", lat: 28.5410, lng: 77.2380, desc: "Tempat peristirahatan santo Sufi abad ke-14 yang dikenal sebagai 'Lampu dari Delhi'. Kuil ini merupakan tempat suci bersejarah yang sangat dihormati di Delhi Selatan." },
                    { name: "Benteng Merah", lat: 28.6562, lng: 77.2410, desc: "Situs Warisan Dunia UNESCO dan kediaman utama kaisar Mughal selama 200 tahun. Simbol kemerdekaan India dan kemegahan arsitektur dengan dinding batu pasir merahnya." },
                    { name: "Makam Humayun", lat: 28.5933, lng: 77.2507, desc: "Makam taman pertama di India, dibangun tahun 1570 untuk Kaisar Humayun. Berfungsi sebagai inspirasi arsitektural bagi pembangunan Taj Mahal di masa depan." },
                    { name: "Qutub Minar", lat: 28.5244, lng: 77.1855, desc: "Menara bata tertinggi di dunia, dibangun tahun 1193 oleh Qutb-ud-din Aibak. Kompleks ini juga menyimpan Pilar Besi kuno dan berbagai reruntuhan candi kuno." },
                    { name: "Jama Masjid Delhi", lat: 28.6507, lng: 77.2334, desc: "Salah satu masjid terbesar di India, dibangun oleh Kaisar Shah Jahan di jantung Old Delhi. Dapat menampung lebih dari 25.000 jemaah di halaman luasnya." },
                    { name: "Nizamuddin Dargah", lat: 28.5913, lng: 77.2425, desc: "Kuil orang suci Sufi ternama dunia Nizamuddin Auliya. Terkenal dengan sesi Qawwali malamnya yang menyentuh jiwa dan suasana religius yang kental." },
                    { name: "Kuil Lotus", lat: 28.5535, lng: 77.2588, desc: "Rumah Ibadah Baha'i yang terkenal dengan bentuk bunga teratainya. Situs doa dan meditasi dalam keheningan yang terbuka bagi orang-orang dari semua agama." },
                    { name: "Taman Lodhi", lat: 28.5931, lng: 77.2197, desc: "Taman kota luas yang berisi makam penguasa Lodhi dan Sayyid abad ke-15. Tempat populer bagi pejalan kaki dan penggemar sejarah di Delhi Selatan." },
                    { name: "Garden of Five Senses", lat: 28.5100, lng: 77.2000, desc: "Taman yang dirancang unik di Saket untuk merangsang lima indera manusia. Menampilkan mural, patung, dan berbagai taman bertema di area yang luas." }
                ]
            },
            {
                city: "Ajmer",
                spots: [
                    { name: "Ajmer Sharif Dargah", lat: 26.4561, lng: 74.6284, desc: "Kuil suci Khwaja Moinuddin Chishti, pendiri tarekat Sufi Chishtiya. Merupakan salah satu situs ziarah paling suci dan paling banyak dikunjungi di India." },
                    { name: "Benteng Taragarh", lat: 26.4468, lng: 74.6189, desc: "Benteng bersejarah yang dibangun di bukit curam, menawarkan pemandangan panorama kota Ajmer. Salah satu benteng bukit tertua yang berfungsi sebagai pos militer strategis." },
                    { name: "Adhai Din Ka Jhopda", lat: 26.4552, lng: 74.6251, desc: "Masjid Indo-Islam awal yang dibangun oleh Qutb-ud-din Aibak hanya dalam dua setengah hari. Menampilkan layar lengkung yang menakjubkan dan pilar berukir rumit." },
                    { name: "Danau Ana Sagar", lat: 26.4741, lng: 74.6258, desc: "Danau buatan besar yang dibangun pada abad ke-12, dikelilingi oleh paviliun marmer (Baradari). Tempat populer untuk jalan sore dan menikmati matahari terbenam." },
                    { name: "Taman Daulat Bagh", lat: 26.4750, lng: 74.6260, desc: "Taman indah di samping Danau Ana Sagar, dibangun oleh Kaisar Jahangir. Memiliki paviliun marmer dan tanaman hijau subur untuk bersantai di tepi danau." }
                ]
            },
            {
                city: "Salwar Sharif",
                spots: [
                    { name: "Dargah of Khwaja Fakhruddin Chishti", lat: 26.5500, lng: 74.8000, desc: "Kuil putra tertua Khwaja Moinuddin Chishti yang terletak di Salwar. Situs Sufi penting bagi mereka yang mengikuti tradisi Chishtiya." }
                ]
            },
            {
                city: "Pushkar",
                spots: [
                    { name: "Kuil Brahma", lat: 26.4900, lng: 74.5500, desc: "Salah satu dari sedikit kuil di dunia yang didedikasikan untuk dewa pencipta Hindu, Brahma. Situs utama bagi peziarah yang mengunjungi kota suci Pushkar." },
                    { name: "Pushkar Lake Ghats", lat: 26.4883, lng: 74.5518, desc: "Danau suci yang dikelilingi oleh 52 ghat mandi tempat para pemuja melakukan ritual mandi suci. Pusat kehidupan religius kota dan tuan rumah festival Pushkar." }
                ]
            }
        ];

        function App() {
            const [visited, setVisited] = useState(() => JSON.parse(localStorage.getItem('visited_spots') || '[]'));
            const [userLoc, setUserLoc] = useState(null);
            const [isTracking, setIsTracking] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");

            useEffect(() => {
                localStorage.setItem('visited_spots', JSON.stringify(visited));
            }, [visited]);

            const calculateDistance = (lat1, lon1, lat2, lon2) => {
                const R = 6371;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon / 2) * Math.sin(dLon / 2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                return R * c;
            };

            const toggleGPS = () => {
                if (!navigator.geolocation) {
                    alert("Geolokasi tidak didukung oleh peramban Anda.");
                    return;
                }

                if (isTracking) {
                    setIsTracking(false);
                    setUserLoc(null);
                } else {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                            setIsTracking(true);
                            navigator.geolocation.watchPosition(
                                (watchPos) => setUserLoc({ lat: watchPos.coords.latitude, lng: watchPos.coords.longitude }),
                                (err) => console.error(err),
                                { enableHighAccuracy: true }
                            );
                        },
                        (err) => {
                            alert("Mohon aktifkan akses lokasi di pengaturan perangkat Anda untuk menggunakan Radar.");
                            setIsTracking(false);
                        },
                        { enableHighAccuracy: true }
                    );
                }
            };

            const toggleVisit = (name) => {
                setVisited(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
            };

            const filteredData = useMemo(() => {
                return TRAVEL_DATA.map(group => ({
                    ...group,
                    spots: group.spots.filter(spot => 
                        spot.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                        group.city.toLowerCase().includes(searchQuery.toLowerCase())
                    )
                })).filter(group => group.spots.length > 0);
            }, [searchQuery]);

            const totalSpots = TRAVEL_DATA.reduce((acc, g) => acc + g.spots.length, 0);
            const progress = Math.round((visited.length / totalSpots) * 100);

            return (
                <div className="min-h-screen max-w-2xl mx-auto p-4 space-y-6">
                    <header className="flex justify-between items-center py-4 sticky top-0 bg-[#020617] z-50">
                        <div>
                            <h1 className="text-2xl font-black tracking-tight text-white uppercase italic">Hubli Quest</h1>
                            <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">
                                Progress: {visited.length} / {totalSpots} • {progress}%
                            </div>
                        </div>
                        <button 
                            onClick={toggleGPS}
                            className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-all ${isTracking ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'bg-slate-800 text-slate-400'}`}
                        >
                            <i className={`fas ${isTracking ? 'fa-satellite animate-pulse' : 'fa-location-dot'}`}></i>
                        </button>
                    </header>

                    <div className="relative group">
                        <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-500 transition-colors"></i>
                        <input 
                            type="text" 
                            placeholder="Cari kota atau monumen..." 
                            className="w-full search-bar rounded-2xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all text-slate-200"
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                        />
                    </div>

                    <div className="h-1 bg-slate-800 rounded-full overflow-hidden">
                        <div 
                            className="h-full bg-indigo-500 transition-all duration-700 ease-out"
                            style={{ width: `${progress}%` }}
                        ></div>
                    </div>

                    <main className="space-y-10">
                        {filteredData.map((group, gIdx) => (
                            <section key={group.city} className="space-y-4 animate-fade-in" style={{ animationDelay: `${gIdx * 0.05}s` }}>
                                <div className="flex items-center gap-3">
                                    <div className="h-px flex-1 bg-slate-800"></div>
                                    <h2 className="city-gradient font-black text-xs uppercase tracking-[0.2em]">{group.city}</h2>
                                    <div className="h-px flex-1 bg-slate-800"></div>
                                </div>
                                
                                <div className="grid gap-3">
                                    {group.spots.map((spot) => {
                                        const isVisited = visited.includes(spot.name);
                                        const dist = userLoc ? calculateDistance(userLoc.lat, userLoc.lng, spot.lat, spot.lng) : null;
                                        
                                        return (
                                            <div 
                                                key={spot.name} 
                                                className={`glass-card p-5 rounded-3xl relative overflow-hidden ${isVisited ? 'opacity-60 grayscale-[0.5]' : ''}`}
                                            >
                                                <div className="flex justify-between items-start gap-4">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <h4 className={`text-lg font-bold tracking-tight ${isVisited ? 'text-slate-500 line-through' : 'text-slate-100'}`}>
                                                                {spot.name}
                                                            </h4>
                                                            {isTracking && dist !== null && (
                                                                <span className="text-[9px] font-black bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded-md uppercase">
                                                                    {dist < 1 ? `${Math.round(dist * 1000)}m` : `${dist.toFixed(1)}km`}
                                                                </span>
                                                            )}
                                                        </div>
                                                        <p className="text-xs text-slate-400 leading-relaxed italic">
                                                            {spot.desc}
                                                        </p>
                                                    </div>
                                                    
                                                    <div className="flex flex-col gap-2">
                                                        <a 
                                                            href={`https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}`}
                                                            target="_blank"
                                                            className="w-10 h-10 bg-indigo-500/10 text-indigo-500 rounded-xl flex items-center justify-center transition-all hover:bg-indigo-500 hover:text-white"
                                                        >
                                                            <i className="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                                                        </a>
                                                        <button 
                                                            onClick={() => toggleVisit(spot.name)}
                                                            className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${isVisited ? 'bg-green-500 text-white' : 'bg-slate-800 text-slate-500'}`}
                                                        >
                                                            <i className={`fas ${isVisited ? 'fa-check' : 'fa-circle-check opacity-20'}`}></i>
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>
                        ))}
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-slate-900/80 backdrop-blur-xl border border-white/5 py-4 px-10 rounded-full flex justify-between items-center shadow-2xl z-50">
                        <button onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} className="flex flex-col items-center gap-1 text-indigo-500">
                            <i className="fas fa-home text-lg"></i>
                            <span className="text-[8px] font-bold uppercase tracking-widest">Beranda</span>
                        </button>
                        <button 
                            onClick={() => {
                                const next = TRAVEL_DATA.flatMap(g => g.spots).find(s => !visited.includes(s.name));
                                if (next) {
                                    setSearchQuery(next.name);
                                    setTimeout(() => window.scrollTo({top: 0, behavior: 'smooth'}), 100);
                                }
                            }}
                            className="flex flex-col items-center gap-1 text-slate-500"
                        >
                            <i className="fas fa-search text-lg"></i>
                            <span className="text-[8px] font-bold uppercase tracking-widest">Cari</span>
                        </button>
                        <button 
                            onClick={() => {
                                if(confirm("Hapus semua riwayat kunjungan?")) {
                                    setVisited([]);
                                    localStorage.removeItem('visited_spots');
                                }
                            }}
                            className="flex flex-col items-center gap-1 text-red-500/40"
                        >
                            <i className="fas fa-rotate-left text-lg"></i>
                            <span className="text-[8px] font-bold uppercase tracking-widest">Atur Ulang</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
