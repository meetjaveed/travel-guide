<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hubli Travel Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .city-header {
            background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .check-btn {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .check-btn.active {
            background-color: #22c55e;
            color: white;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
        }

        .check-btn.inactive {
            background-color: rgba(30, 41, 59, 0.8);
            color: rgba(148, 163, 184, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="pb-32">

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TRAVEL_DATA = [
            {
                city: "Agra",
                spots: [
                    { name: "Taj Mahal", lat: 27.1751, lng: 78.0421, desc: "A world-famous white marble mausoleum built by Shah Jahan in memory of his beloved wife Mumtaz Mahal. It is widely considered a masterpiece of Mughal architecture and is a UNESCO World Heritage site." },
                    { name: "Agra Fort", lat: 27.1795, lng: 78.0211, desc: "A massive 16th-century red sandstone fortress that served as the main residence of the Mughal emperors. The site includes grand structures like the Khas Mahal, Diwan-i-Am, and Jahangir Palace." },
                    { name: "Itmad-ud-Daulah (Baby Taj)", lat: 27.1929, lng: 78.0311, desc: "Often referred to as the 'Baby Taj', this tomb is the first Mughal structure built entirely of white marble. It features delicate stone inlay work and is beautifully located on the bank of the Yamuna River." },
                    { name: "Jama Masjid Agra", lat: 27.1858, lng: 78.0163, desc: "A grand 17th-century mosque built by Shah Jahan's daughter, Jahanara Begum, using red sandstone and marble. It stands as a prominent landmark facing the Agra Fort and is famous for its intricate design." },
                    { name: "Moti Masjid", lat: 27.1800, lng: 78.0220, desc: "Known as the 'Pearl Mosque', this structure within the Agra Fort is celebrated for its pristine white marble architecture. It was commissioned by Shah Jahan as a private place of worship for the royal members of the court." },
                    { name: "Mehtab Bagh", lat: 27.1788, lng: 78.0423, desc: "The Moonlight Garden is situated perfectly on the opposite bank of the Yamuna River, providing a legendary view of the Taj Mahal. It was the last of eleven royal gardens built by the Mughals in the area." },
                    { name: "Ram Bagh", lat: 27.2000, lng: 78.0400, desc: "The oldest Mughal garden in India, originally established by Emperor Babur in 1528. It follows the traditional Charbagh layout with a network of water channels designed to keep the surroundings cool." }
                ]
            },
            {
                city: "Lucknow",
                spots: [
                    { name: "Bara Imambara", lat: 26.8689, lng: 80.9135, desc: "An architectural marvel featuring a massive vaulted hall built without any external pillar supports. It is home to the world-famous Bhulbhulaiya, a complex and intriguing stone labyrinth of corridors." },
                    { name: "Chhota Imambara", lat: 26.8770, lng: 80.9048, desc: "Also known as the Palace of Lights, it is renowned for its collection of crystal chandeliers and a majestic silver throne. The building was commissioned by Muhammad Ali Shah and features exquisite calligraphy." },
                    { name: "Rumi Darwaza", lat: 26.8684, lng: 80.9122, desc: "An imposing gateway that serves as the iconic landmark of Lucknow, modeled after the historic Sublime Porte in Istanbul. It stands sixty feet tall and is a prime example of unique Awadhi architectural style." },
                    { name: "The Residency", lat: 26.8631, lng: 80.9272, desc: "A collection of ruins that once served as the official residence for the British Resident General. It played a pivotal role during the Siege of Lucknow in 1857 and is now a protected historical monument." },
                    { name: "Ambedkar Memorial Park", lat: 26.8454, lng: 80.9785, desc: "A massive public park and memorial constructed entirely from red sandstone brought from Rajasthan. The park features vast open lawns, grand elephant statues, and a high-domed memorial stupa." },
                    { name: "Janeshwar Mishra Park", lat: 26.8400, lng: 81.0000, desc: "An eco-friendly park recognized as one of the largest in Asia, featuring long jogging tracks and a large man-made lake. It provides a significant green space and recreational area for the people of Lucknow." },
                    { name: "Dargah Dada Miyan", lat: 26.8521, lng: 80.9322, desc: "A highly revered Sufi shrine of Hazrat Shah Meena Shah, located in the historic heart of the old city. It draws thousands of devotees from all faiths who come seeking spiritual blessings and inner peace." },
                    { name: "Shah Mina Shah Mazar", lat: 26.8500, lng: 80.9300, desc: "The final resting place of the 15th-century Sufi saint, widely regarded as the patron saint of Lucknow city. The mazar remains a significant center for spiritual seekers and communal harmony for centuries." }
                ]
            },
            {
                city: "Bahraich",
                spots: [
                    { name: "Dargah Syed Salar Masood Ghazi", lat: 27.5855, lng: 81.6033, desc: "An ancient and holy shrine of the 11th-century warrior saint, attracting huge crowds during the annual Jeth Mela. It stands as a powerful symbol of religious devotion and unity in North India." },
                    { name: "Maneejri Masjid", lat: 27.5700, lng: 81.5900, desc: "A historic local mosque known for its traditional architectural elements and its importance to the local community. It serves as a vital spiritual gathering place for the residents of Bahraich." },
                    { name: "Jama Masjid Bahraich", lat: 27.5750, lng: 81.6000, desc: "The central and largest congregational mosque in the city, characterized by its classic domes and tall minarets. It is the main site for congregational Friday prayers and important Islamic festivities." }
                ]
            },
            {
                city: "Kanpur / Makanpur",
                spots: [
                    { name: "Dargah Zinda Shah Madar", lat: 26.8373, lng: 80.0465, desc: "A world-renowned Sufi shrine in Makanpur dedicated to the founder of the Madariyya Sufi order. It is recognized as one of the oldest and most significant spiritual hubs for Sufism in the Indian subcontinent." },
                    { name: "Kanpur Memorial Church", lat: 26.4500, lng: 80.3600, desc: "Built in 1875 using the Gothic Revival style to honor British soldiers who died during the 1857 siege. The church features impressive stained glass work and intricate brick carvings." },
                    { name: "JK Temple", lat: 26.4754, lng: 80.3060, desc: "A stunning temple made of pure white marble dedicated to Lord Radhakrishna, combining modern and ancient architecture. It is set within beautifully manicured gardens and is a major landmark in Kanpur." },
                    { name: "Allen Forest Zoo", lat: 26.5050, lng: 80.3000, desc: "Unique among Indian zoos as it was developed within a natural forest area, providing spacious habitats for its residents. It is a key destination for nature lovers and a center for wildlife conservation." },
                    { name: "Nana Rao Park", lat: 26.4700, lng: 80.3500, desc: "A historic park established on the site of the 1857 Bibighar incident, now dedicated to the memory of Nana Sahib. It serves as a peaceful city park containing various historical statues and diverse flora." }
                ]
            },
            {
                city: "Kichocha",
                spots: [
                    { name: "Dargah Makhdoom Ashraf Semnani", lat: 26.4258, lng: 82.7569, desc: "A globally famous Sufi shrine celebrated for its spiritual healing powers and serene environment. The holy water or 'Neer' from the adjacent pond is widely believed to possess miraculous curative properties." }
                ]
            },
            {
                city: "Bareilly",
                spots: [
                    { name: "Dargah-e-Ala Hazrat", lat: 28.3751, lng: 79.4144, desc: "The sacred shrine of Imam Ahmed Raza Khan, a world-famous Islamic scholar and polymath. It serves as the international headquarters for the Barelvi movement and a center for Islamic research." },
                    { name: "Dargah Shah Sharafat Ali Mia", lat: 28.3600, lng: 79.4200, desc: "A major Sufi shrine dedicated to Shah Sharafat Ali, noted for its beautiful aesthetic and spiritual significance. It remains a place of deep devotion and attracts numerous pilgrims throughout the year." },
                    { name: "Phool Bagh", lat: 28.3700, lng: 79.4100, desc: "A meticulously maintained public park in Bareilly that offers a tranquil space for leisure and exercise. It boasts a wide variety of seasonal flowers and is a favorite spot for local morning walkers." },
                    { name: "Akshar Vihar", lat: 28.3500, lng: 79.4300, desc: "A popular recreational park centered around a scenic lake, well-known for boating facilities and family picnics. It is one of the primary green spaces used by the residents of Bareilly city." }
                ]
            },
            {
                city: "Haridwar / Roorkee",
                spots: [
                    { name: "Piran Kaliyar Sharif", lat: 29.9161, lng: 77.9351, desc: "The 13th-century shrine of Alauddin Ali Ahmed Sabir Kaliyari located near Roorkee. It is one of the most revered Sufi destinations in India, famous for its powerful spiritual vibrations." },
                    { name: "Har Ki Pauri", lat: 29.9564, lng: 78.1707, desc: "The iconic ghat on the banks of the Ganges where thousands gather for the mesmerising evening Aarti ceremony. It is spiritually believed to be the point where the holy river leaves the mountains." }
                ]
            },
            {
                city: "Sadhaura",
                spots: [
                    { name: "Dargah of Shah Qumais", lat: 30.3792, lng: 77.2025, desc: "A historic Sufi shrine in Sadhaura belonging to the Qadiriya order of spiritual practitioners. It stands as an important spiritual and historical landmark for the Gumaisia region in northern Haryana." }
                ]
            },
            {
                city: "Panipat",
                spots: [
                    { name: "Kala Amb", lat: 29.4000, lng: 76.9900, desc: "A significant memorial site that marks the exact spot of the 3rd Battle of Panipat in 1761. It serves as a solemn tribute to the Maratha warriors who fought with immense courage on this soil." },
                    { name: "Panipat Museum", lat: 29.3950, lng: 76.9800, desc: "A museum dedicated to preserving the history of the three major battles of Panipat that changed Indian history. It showcases various artifacts, ancient weaponry, and maps detailing the military strategy." },
                    { name: "Dargah Bu Ali Shah Qalandar", lat: 29.3909, lng: 76.9744, desc: "The shrine of the 13th-century Sufi saint from Azerbaijan who chose to settle in the historic town of Panipat. It is a major center for spiritual seekers and is visited by people of all religious backgrounds." },
                    { name: "Ibrahim Lodhi’s Tomb", lat: 29.3920, lng: 76.9750, desc: "The final burial place of the last Sultan of the Lodi dynasty, who was defeated by Babur in the 1st Battle of Panipat. The tomb is a simple yet dignified rectangular structure on a raised platform." }
                ]
            },
            {
                city: "Delhi",
                spots: [
                    { name: "Dargah Hazrat Qutubuddin Bakhtiyar Kaki", lat: 28.5220, lng: 77.1840, desc: "The oldest Sufi shrine in Delhi, dedicated to the spiritual successor of Khwaja Moinuddin Chishti. Located in Mehrauli, it remains a tranquil sanctuary of immense historical and spiritual importance." },
                    { name: "Dargah Hazrat Khwaja Nasiruddin Mahmood Chirag-Dehlavi", lat: 28.5410, lng: 77.2380, desc: "The holy resting place of the 14th-century saint known as the 'Lamp of Delhi'. This sacred shrine in South Delhi is a highly revered historical destination for spiritual seekers and historians alike." },
                    { name: "Red Fort", lat: 28.6562, lng: 77.2410, desc: "A UNESCO World Heritage site that served as the primary residence of Mughal emperors for two centuries. It stands as a grand symbol of India's historical power and is famous for its massive red sandstone walls." },
                    { name: "Humayun’s Tomb", lat: 28.5933, lng: 77.2507, desc: "The first magnificent garden-tomb on the Indian subcontinent, commissioned in 1570 by the Emperor's widow. It is an architectural marvel that later served as the primary inspiration for the design of the Taj Mahal." },
                    { name: "Qutub Minar", lat: 28.5244, lng: 77.1855, desc: "The tallest brick minaret in the world, built in 1193 to celebrate the beginning of Muslim rule in India. The complex also features the ancient Iron Pillar and ruins of several significant historical monuments." },
                    { name: "Jama Masjid", lat: 28.6507, lng: 77.2334, desc: "One of the largest and most impressive mosques in India, built by Emperor Shah Jahan in the heart of Old Delhi. Its vast courtyard can accommodate tens of thousands of devotees for congregational prayers." },
                    { name: "Nizamuddin Dargah", lat: 28.5913, lng: 77.2425, desc: "The sacred shrine of the world-renowned Sufi saint Hazrat Nizamuddin Auliya. It is legendary for its vibrant spiritual atmosphere and the soulful Qawwali performances held in its courtyard." },
                    { name: "Lotus Temple", lat: 28.5535, lng: 77.2588, desc: "A Bahá'í House of Worship famous for its striking lotus-flower shape and serene environment. It is a modern architectural masterpiece open to all people for silent prayer and meditation." },
                    { name: "Lodhi Gardens", lat: 28.5931, lng: 77.2197, desc: "A sprawling city park in South Delhi containing the tombs of rulers from the Lodhi and Sayyid dynasties. It is a favored destination for early morning walks, history enthusiasts, and nature lovers." },
                    { name: "Garden of Five Senses", lat: 28.5100, lng: 77.2000, desc: "A unique park in Saket designed to provide an interactive experience for all human senses. It contains beautifully themed gardens, intricate murals, and artistic sculptures spread across twenty acres." }
                ]
            },
            {
                city: "Ajmer",
                spots: [
                    { name: "Ajmer Sharif Dargah", lat: 26.4561, lng: 74.6284, desc: "The sacred shrine of Khwaja Moinuddin Chishti, the great saint who founded the Chishtiya Sufi order. It is one of the most significant and visited pilgrimage destinations in the entire Islamic world." },
                    { name: "Taragarh Fort", lat: 26.4468, lng: 74.6189, desc: "A historic hilltop fort offering breathtaking panoramic views of the city of Ajmer. Built in the 11th century, it was one of the first hill forts in India and served as a crucial military outpost." },
                    { name: "Adhai Din Ka Jhopda", lat: 26.4552, lng: 74.6251, desc: "An early Indo-Islamic mosque commissioned by Qutb-ud-din Aibak and reportedly constructed in just two and a half days. It features a stunning arched screen and pillars with unique stone carvings." },
                    { name: "Ana Sagar Lake", lat: 26.4741, lng: 74.6258, desc: "A beautiful artificial lake built in the 12th century, famous for its elegant marble pavilions known as Baradari. It is a popular spot for leisure walks and enjoying sunset views over the water." },
                    { name: "Daulat Bagh gardens", lat: 26.4750, lng: 74.6260, desc: "A serene garden area located adjacent to the Ana Sagar Lake, originally established by the Mughal Emperor Jahangir. It offers a lush green escape with marble structures perfect for lakeside relaxation." }
                ]
            },
            {
                city: "Salwar Sharif",
                spots: [
                    { name: "Dargah of Khwaja Fakhruddin Chishti", lat: 26.5500, lng: 74.8000, desc: "The spiritual shrine of the eldest son of the great saint Khwaja Moinuddin Chishti. Located in Salwar, it remains an important site of pilgrimage and devotion within the Sufi Chishtiya tradition." }
                ]
            },
            {
                city: "Pushkar",
                spots: [
                    { name: "Brahma Temple", lat: 26.4900, lng: 74.5500, desc: "One of the very few dedicated temples in the world for Lord Brahma, the creator in Hindu mythology. It is a major spiritual destination for pilgrims who visit the holy town of Pushkar." },
                    { name: "Pushkar Lake Ghats", lat: 26.4883, lng: 74.5518, desc: "A sacred lake with 52 holy ghats where thousands of devotees gather to take a ritual dip. It is the religious heart of Pushkar and is famously associated with the annual camel fair." }
                ]
            }
        ];

        function App() {
            const [visited, setVisited] = useState(() => JSON.parse(localStorage.getItem('visited_spots_v3') || '[]'));
            const [userLoc, setUserLoc] = useState(null);
            const [isTracking, setIsTracking] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");

            useEffect(() => {
                localStorage.setItem('visited_spots_v3', JSON.stringify(visited));
            }, [visited]);

            const calculateDistance = (lat1, lon1, lat2, lon2) => {
                const R = 6371;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon / 2) * Math.sin(dLon / 2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                return R * c;
            };

            const toggleGPS = () => {
                if (!navigator.geolocation) {
                    alert("Geolocation is not supported by your browser.");
                    return;
                }

                if (isTracking) {
                    setIsTracking(false);
                    setUserLoc(null);
                } else {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                            setIsTracking(true);
                            navigator.geolocation.watchPosition(
                                (watchPos) => setUserLoc({ lat: watchPos.coords.latitude, lng: watchPos.coords.longitude }),
                                (err) => console.error(err),
                                { enableHighAccuracy: true }
                            );
                        },
                        (err) => {
                            alert("Location access denied. Please check your device settings.");
                            setIsTracking(false);
                        },
                        { enableHighAccuracy: true }
                    );
                }
            };

            const toggleVisit = (name) => {
                setVisited(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
            };

            const filteredData = useMemo(() => {
                return TRAVEL_DATA.map(group => ({
                    ...group,
                    spots: group.spots.filter(spot => 
                        spot.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                        group.city.toLowerCase().includes(searchQuery.toLowerCase())
                    )
                })).filter(group => group.spots.length > 0);
            }, [searchQuery]);

            const totalSpots = TRAVEL_DATA.reduce((acc, g) => acc + g.spots.length, 0);
            const progress = Math.round((visited.length / totalSpots) * 100);

            return (
                <div className="min-h-screen max-w-2xl mx-auto p-4 space-y-6">
                    {/* Header */}
                    <header className="flex justify-between items-center py-6 sticky top-0 bg-[#020617] z-50">
                        <div>
                            <h1 className="text-3xl font-black tracking-tight text-white uppercase italic">Hubli Quest</h1>
                            <div className="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">
                                {visited.length} / {totalSpots} COMPLETED • {progress}%
                            </div>
                        </div>
                        <button 
                            onClick={toggleGPS}
                            className={`w-14 h-14 rounded-2xl flex items-center justify-center transition-all duration-500 ${isTracking ? 'bg-indigo-600 text-white shadow-[0_0_25px_rgba(79,70,229,0.5)]' : 'bg-slate-800 text-slate-400 border border-slate-700'}`}
                        >
                            <i className={`fas ${isTracking ? 'fa-satellite animate-pulse' : 'fa-location-dot'} text-xl`}></i>
                        </button>
                    </header>

                    {/* Search */}
                    <div className="relative">
                        <i className="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input 
                            type="text" 
                            placeholder="Find a city or landmark..." 
                            className="w-full bg-slate-900/50 border border-slate-800 rounded-3xl py-5 pl-14 pr-6 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-all text-slate-100 placeholder:text-slate-600"
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                        />
                    </div>

                    {/* Progress Bar */}
                    <div className="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                        <div 
                            className="h-full bg-gradient-to-r from-indigo-600 to-purple-600 transition-all duration-1000 ease-in-out"
                            style={{ width: `${progress}%` }}
                        ></div>
                    </div>

                    {/* Content */}
                    <main className="space-y-12">
                        {filteredData.map((group, gIdx) => (
                            <section key={group.city} className="space-y-6 animate-fade-in" style={{ animationDelay: `${gIdx * 0.05}s` }}>
                                <div className="flex items-center gap-4">
                                    <h2 className="city-header font-black text-sm uppercase tracking-[0.3em] whitespace-nowrap">{group.city}</h2>
                                    <div className="h-px w-full bg-slate-800"></div>
                                </div>
                                
                                <div className="grid gap-4">
                                    {group.spots.map((spot) => {
                                        const isVisited = visited.includes(spot.name);
                                        const dist = userLoc ? calculateDistance(userLoc.lat, userLoc.lng, spot.lat, spot.lng) : null;
                                        
                                        return (
                                            <div 
                                                key={spot.name} 
                                                className={`glass-card p-6 rounded-[32px] relative overflow-hidden transition-all duration-500 ${isVisited ? 'opacity-40 grayscale-[0.3] border-green-500/20' : 'hover:border-indigo-500/30'}`}
                                            >
                                                <div className="flex justify-between items-start gap-6">
                                                    <div className="flex-1 space-y-2">
                                                        <div className="flex flex-wrap items-center gap-3">
                                                            <h4 className={`text-xl font-bold tracking-tight ${isVisited ? 'text-slate-500 line-through' : 'text-slate-100'}`}>
                                                                {spot.name}
                                                            </h4>
                                                            {isTracking && dist !== null && (
                                                                <span className="text-[10px] font-black bg-indigo-500/20 text-indigo-400 px-3 py-1 rounded-lg uppercase tracking-wider">
                                                                    {dist < 1 ? `${Math.round(dist * 1000)}m` : `${dist.toFixed(1)}km`}
                                                                </span>
                                                            )}
                                                        </div>
                                                        <p className="text-[13px] text-slate-400 leading-relaxed font-medium italic opacity-80">
                                                            {spot.desc}
                                                        </p>
                                                    </div>
                                                    
                                                    <div className="flex flex-col gap-3">
                                                        <button 
                                                            onClick={() => toggleVisit(spot.name)}
                                                            className={`check-btn w-14 h-14 rounded-2xl flex items-center justify-center text-xl ${isVisited ? 'active' : 'inactive hover:border-slate-500'}`}
                                                        >
                                                            <i className={`fas ${isVisited ? 'fa-check' : 'fa-plus opacity-30'}`}></i>
                                                        </button>
                                                        <a 
                                                            href={`https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lng}`}
                                                            target="_blank"
                                                            className="w-14 h-14 bg-slate-800/50 text-slate-400 rounded-2xl flex items-center justify-center hover:bg-indigo-500 hover:text-white transition-all border border-slate-700"
                                                        >
                                                            <i className="fa-solid fa-diamond-turn-right text-lg"></i>
                                                        </a>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>
                        ))}
                    </main>

                    {/* Nav */}
                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-slate-900/90 backdrop-blur-2xl border border-white/5 py-5 px-10 rounded-[35px] flex justify-between items-center shadow-[0_25px_50px_-12px_rgba(0,0,0,0.8)] z-50">
                        <button onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} className="flex flex-col items-center gap-1.5 text-indigo-500 group">
                            <i className="fas fa-home text-xl group-active:scale-90 transition-transform"></i>
                            <span className="text-[9px] font-bold uppercase tracking-widest">Guide</span>
                        </button>
                        <button 
                            onClick={() => {
                                const next = TRAVEL_DATA.flatMap(g => g.spots).find(s => !visited.includes(s.name));
                                if (next) {
                                    setSearchQuery(next.name);
                                    setTimeout(() => window.scrollTo({top: 0, behavior: 'smooth'}), 150);
                                }
                            }}
                            className="flex flex-col items-center gap-1.5 text-slate-500 group"
                        >
                            <i className="fas fa-magnifying-glass text-xl group-active:scale-90 transition-transform"></i>
                            <span className="text-[9px] font-bold uppercase tracking-widest">Locate</span>
                        </button>
                        <button 
                            onClick={() => {
                                if(confirm("Reset all visit history?")) {
                                    setVisited([]);
                                    localStorage.removeItem('visited_spots_v3');
                                }
                            }}
                            className="flex flex-col items-center gap-1.5 text-red-500/40 group"
                        >
                            <i className="fas fa-power-off text-xl group-active:scale-90 transition-transform"></i>
                            <span className="text-[9px] font-bold uppercase tracking-widest">Reset</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
